<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800">
  <defs>
    <filter id="grain">
      <feTurbulence baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="grain"/>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a2520"/>
    </marker>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8a7040"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a7fb5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="#f0ebe3"/>
  <rect width="1400" height="800" fill="#f5f0e8" opacity="0.5"/>
  <rect width="1400" height="800" filter="url(#grain)" opacity="0.03"/>

  <!-- Top separator line -->
  <line x1="60" y1="120" x2="1340" y2="120" stroke="#c0b8a8" stroke-width="0.5"/>

  <!-- TITLE -->
  <text x="700" y="60" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#2a2520" letter-spacing="4" font-variant="small-caps">
    Álgebra de composición intercelular del marco SV
  </text>

  <!-- SUBTITLE -->
  <text x="700" y="105" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="#1a1510" letter-spacing="2" font-weight="bold">
    III. Horizonte de sucesos y reevaluación discreta
  </text>

  <!-- Bottom separator line -->
  <line x1="60" y1="130" x2="1340" y2="130" stroke="#c0b8a8" stroke-width="0.5"/>

  <!-- ==================== LEFT: POLAR POLYGON ==================== -->
  <g transform="translate(185, 420)">
    <!-- Circles -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#b0a898" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#c5bdb0" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#d0c8bb" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#d8d0c5" stroke-width="0.3"/>

    <!-- Radial lines -->
    <line x1="0" y1="-125" x2="0" y2="125" stroke="#c5bdb0" stroke-width="0.3"/>
    <line x1="-125" y1="0" x2="125" y2="0" stroke="#c5bdb0" stroke-width="0.3"/>
    <line x1="-88" y1="-88" x2="88" y2="88" stroke="#c5bdb0" stroke-width="0.3"/>
    <line x1="88" y1="-88" x2="-88" y2="88" stroke="#c5bdb0" stroke-width="0.3"/>
    <line x1="-48" y1="-115" x2="48" y2="115" stroke="#c5bdb0" stroke-width="0.3"/>
    <line x1="48" y1="-115" x2="-48" y2="115" stroke="#c5bdb0" stroke-width="0.3"/>
    <line x1="-115" y1="-48" x2="115" y2="48" stroke="#c5bdb0" stroke-width="0.3"/>
    <line x1="115" y1="-48" x2="-115" y2="48" stroke="#c5bdb0" stroke-width="0.3"/>

    <!-- Polygon S_n (state before event) - lighter -->
    <polygon points="0,-95 55,-50 100,20 70,80 20,110 -40,90 -95,40 -80,-15 -45,-70 -10,-100"
             fill="#4a7fb510" stroke="#4a7fb5" stroke-width="1.2" stroke-linejoin="round" stroke-dasharray="4,3" opacity="0.5"/>

    <!-- Polygon S_{n+1} (state after event) - solid -->
    <polygon points="0,-70 65,-35 95,30 50,95 -10,105 -55,80 -90,25 -70,-25 -30,-60 -5,-75"
             fill="#4a7fb518" stroke="#4a7fb5" stroke-width="1.8" stroke-linejoin="round"/>

    <!-- Labels -->
    <text x="0" y="-133" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6a6050">P2</text>
    <text x="95" y="-95" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6a6050">P2</text>
    <text x="130" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6a6050">14</text>
    <text x="95" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6a6050">P5</text>
    <text x="0" y="143" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6a6050">P8</text>
    <text x="-95" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6a6050">P9</text>
    <text x="-95" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6a6050">P7</text>
    <text x="-130" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6a6050">P0</text>
    <text x="-130" y="-45" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6a6050">P6</text>

    <!-- S_n and S_{n+1} labels -->
    <text x="-50" y="-100" font-family="Georgia, serif" font-size="10" fill="#4a7fb5" opacity="0.5" font-style="italic">Sₙ</text>
    <text x="60" y="110" font-family="Georgia, serif" font-size="10" fill="#4a7fb5" font-style="italic">Sₙ₊₁</text>
  </g>

  <!-- ≡ symbol -->
  <text x="330" y="425" text-anchor="middle" font-family="Georgia, serif" font-size="36" fill="#3a3530">≡</text>

  <!-- ==================== CENTER: HORIZON + FRAMES + TRAJECTORY ==================== -->
  <g transform="translate(370, 185)">

    <!-- ℋ(𝒜) horizon box at top -->
    <rect x="90" y="0" width="340" height="40" rx="4" fill="none" stroke="#2a2520" stroke-width="1.5"/>
    <text x="260" y="26" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2a2520" font-weight="bold">H(A) = {ε₁, ε₂, …, εₘ}</text>

    <!-- Label -->
    <text x="260" y="-10" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8a8070" font-style="italic">horizonte de sucesos declarado</text>

    <!-- Arrows down from horizon to events -->
    <line x1="160" y1="40" x2="100" y2="80" stroke="#8a7040" stroke-width="1" marker-end="url(#arrowGold)"/>
    <line x1="260" y1="40" x2="260" y2="80" stroke="#8a7040" stroke-width="1" marker-end="url(#arrowGold)"/>
    <line x1="360" y1="40" x2="420" y2="80" stroke="#8a7040" stroke-width="1" marker-end="url(#arrowGold)"/>

    <!-- Events row: ε with ternary states -->
    <rect x="70" y="82" width="65" height="28" rx="3" fill="#f5f0e8" stroke="#8a7040" stroke-width="1"/>
    <text x="102" y="101" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#8a7040">(ε₁, 1)</text>

    <rect x="228" y="82" width="65" height="28" rx="3" fill="#f5f0e8" stroke="#8a7040" stroke-width="1"/>
    <text x="260" y="101" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#8a7040">(ε₃, U)</text>

    <rect x="390" y="82" width="65" height="28" rx="3" fill="#f5f0e8" stroke="#8a7040" stroke-width="1"/>
    <text x="422" y="101" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#8a7040">(ε₅, 0)</text>

    <!-- Arrow: events become νₙ -->
    <line x1="170" y1="110" x2="210" y2="140" stroke="#2a2520" stroke-width="0.8"/>
    <line x1="260" y1="110" x2="260" y2="140" stroke="#2a2520" stroke-width="0.8"/>
    <line x1="355" y1="110" x2="310" y2="140" stroke="#2a2520" stroke-width="0.8"/>

    <!-- νₙ datum box -->
    <rect x="195" y="142" width="130" height="35" rx="4" fill="#8a704012" stroke="#8a7040" stroke-width="1.5"/>
    <text x="260" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2a2520" font-weight="bold">νₙ</text>

    <!-- Arrow: νₙ → 𝒯 -->
    <line x1="260" y1="177" x2="260" y2="205" stroke="#2a2520" stroke-width="1" marker-end="url(#arrowhead)"/>

    <!-- 𝒯 operator box -->
    <rect x="195" y="207" width="130" height="35" rx="4" fill="#f5f0e8" stroke="#2a2520" stroke-width="1.5"/>
    <text x="260" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2a2520" font-weight="bold">T_{νₙ}</text>

    <!-- Labels left side -->
    <text x="55" y="165" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#6a6050" font-style="italic">dato</text>
    <text x="55" y="230" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#6a6050" font-style="italic">operador</text>

    <!-- Arrow: 𝒯 → ℰ -->
    <line x1="260" y1="242" x2="260" y2="270" stroke="#2a2520" stroke-width="1" marker-end="url(#arrowhead)"/>

    <!-- ℰ evaluation box -->
    <rect x="195" y="272" width="130" height="35" rx="4" fill="#4a7fb510" stroke="#4a7fb5" stroke-width="1.5"/>
    <text x="260" y="295" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2a2520">E(A, Pₙ₊₁)</text>

    <text x="55" y="295" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#6a6050" font-style="italic">evaluación</text>

    <!-- Arrow: ℰ → frame -->
    <line x1="260" y1="307" x2="260" y2="335" stroke="#2a2520" stroke-width="1" marker-end="url(#arrowhead)"/>

    <!-- ==================== TRAJECTORY ROW ==================== -->
    <!-- Frame S₁ -->
    <rect x="40" y="340" width="70" height="50" rx="4" fill="#4a7fb512" stroke="#4a7fb5" stroke-width="1.5"/>
    <text x="75" y="362" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2a2520" font-weight="bold">S₁</text>
    <text x="75" y="381" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#22885a">APTO</text>

    <!-- ν₁ -->
    <line x1="110" y1="365" x2="145" y2="365" stroke="#8a7040" stroke-width="1.2" marker-end="url(#arrowGold)"/>
    <text x="128" y="358" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#8a7040" font-style="italic">ν₁</text>

    <!-- Frame S₂ -->
    <rect x="150" y="340" width="70" height="50" rx="4" fill="#e8a02018" stroke="#c47850" stroke-width="1.5"/>
    <text x="185" y="362" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2a2520" font-weight="bold">S₂</text>
    <text x="185" y="381" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#b08020">INDET</text>

    <!-- ν₂ -->
    <line x1="220" y1="365" x2="255" y2="365" stroke="#8a7040" stroke-width="1.2" marker-end="url(#arrowGold)"/>
    <text x="238" y="358" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#8a7040" font-style="italic">ν₂</text>

    <!-- Frame S₃ -->
    <rect x="260" y="340" width="70" height="50" rx="4" fill="#e8a02018" stroke="#c47850" stroke-width="1.5"/>
    <text x="295" y="362" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2a2520" font-weight="bold">S₃</text>
    <text x="295" y="381" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#b08020">INDET</text>

    <!-- ν₃ -->
    <line x1="330" y1="365" x2="365" y2="365" stroke="#8a7040" stroke-width="1.2" marker-end="url(#arrowGold)"/>
    <text x="348" y="358" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#8a7040" font-style="italic">ν₃</text>

    <!-- Frame S₄ -->
    <rect x="370" y="340" width="70" height="50" rx="4" fill="#4a7fb512" stroke="#4a7fb5" stroke-width="1.5"/>
    <text x="405" y="362" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2a2520" font-weight="bold">S₄</text>
    <text x="405" y="381" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#22885a">APTO</text>

    <!-- Trajectory brace -->
    <text x="240" y="415" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2a2520" font-style="italic">T = (S₁, ν₁, S₂, ν₂, S₃, ν₃, S₄)</text>

    <!-- Lock icon -->
    <text x="460" y="372" font-family="Georgia, serif" font-size="9" fill="#8a8070" opacity="0.5">inmutable</text>
    <text x="460" y="384" font-family="Georgia, serif" font-size="8" fill="#8a8070" opacity="0.5">append-only</text>

    <!-- Feedback arrow ν₂ endo from S₂ -->
    <path d="M 185,390 C 185,415 238,415 238,390" fill="none" stroke="#22885a" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.6"/>
    <text x="212" y="425" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#22885a" opacity="0.7">endo</text>

    <!-- δ_Γ label between S₁ and S₂ -->
    <text x="128" y="402" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#6a6050">δ_Γ</text>
  </g>

  <!-- ==================== RIGHT: NEURON ILLUSTRATION ==================== -->
  <g transform="translate(1050, 350)" opacity="0.6">
    <!-- Soma -->
    <ellipse cx="80" cy="40" rx="55" ry="50" fill="#c8c0b5" stroke="#8a8070" stroke-width="1"/>
    <ellipse cx="80" cy="40" rx="45" ry="40" fill="#d5ccc0" stroke="#9a9285" stroke-width="0.5"/>
    <!-- Nucleus -->
    <circle cx="80" cy="35" r="18" fill="#b5ad9f" stroke="#8a8070" stroke-width="0.5"/>
    <circle cx="75" cy="32" r="7" fill="#a09888" stroke="none"/>
    <!-- Dendrites -->
    <path d="M35,10 Q10,-20 -20,-35" fill="none" stroke="#a09888" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-20,-35 Q-35,-42 -45,-38" fill="none" stroke="#a09888" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M-20,-35 Q-28,-50 -35,-55" fill="none" stroke="#a09888" stroke-width="1" stroke-linecap="round"/>
    <path d="M50,-5 Q35,-35 20,-55" fill="none" stroke="#a09888" stroke-width="2" stroke-linecap="round"/>
    <path d="M20,-55 Q12,-68 5,-72" fill="none" stroke="#a09888" stroke-width="1" stroke-linecap="round"/>
    <path d="M20,-55 Q25,-70 30,-78" fill="none" stroke="#a09888" stroke-width="1" stroke-linecap="round"/>
    <path d="M80,-10 Q85,-40 78,-65" fill="none" stroke="#a09888" stroke-width="2" stroke-linecap="round"/>
    <path d="M78,-65 Q72,-80 65,-85" fill="none" stroke="#a09888" stroke-width="1" stroke-linecap="round"/>
    <path d="M110,-5 Q135,-25 155,-30" fill="none" stroke="#a09888" stroke-width="2" stroke-linecap="round"/>
    <path d="M155,-30 Q168,-32 175,-28" fill="none" stroke="#a09888" stroke-width="1" stroke-linecap="round"/>
    <path d="M155,-30 Q165,-40 170,-50" fill="none" stroke="#a09888" stroke-width="1" stroke-linecap="round"/>
    <path d="M130,20 Q160,5 180,-5" fill="none" stroke="#a09888" stroke-width="2" stroke-linecap="round"/>
    <path d="M180,-5 Q190,-10 195,-8" fill="none" stroke="#a09888" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M125,55 Q155,50 175,55" fill="none" stroke="#a09888" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M175,55 Q188,58 195,52" fill="none" stroke="#a09888" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M35,70 Q10,85 -15,95" fill="none" stroke="#a09888" stroke-width="2" stroke-linecap="round"/>
    <path d="M-15,95 Q-25,100 -30,95" fill="none" stroke="#a09888" stroke-width="1" stroke-linecap="round"/>
    <path d="M55,80 Q45,105 40,125" fill="none" stroke="#a09888" stroke-width="2" stroke-linecap="round"/>
    <path d="M40,125 Q35,140 30,145" fill="none" stroke="#a09888" stroke-width="1" stroke-linecap="round"/>
    <!-- Axon -->
    <path d="M80,90 Q85,130 82,170 Q78,210 85,250 Q88,280 82,310" fill="none" stroke="#8a8070" stroke-width="3" stroke-linecap="round"/>
    <!-- Axon terminal -->
    <ellipse cx="82" cy="320" rx="12" ry="8" fill="#a09888" stroke="#8a8070" stroke-width="0.8"/>
  </g>

  <!-- ==================== BOTTOM: LOGO AND CREDITS ==================== -->
  <g transform="translate(1050, 700)">
    <!-- Shield icon -->
    <path d="M0,0 L20,0 L20,22 L10,30 L0,22 Z" fill="none" stroke="#2a2520" stroke-width="1.5"/>
    <path d="M5,5 L10,5 L10,18 L5,15 Z" fill="#2a2520" opacity="0.3"/>
    <path d="M10,5 L15,5 L15,15 L10,18 Z" fill="#2a2520" opacity="0.15"/>
    <path d="M3,16 L10,8 L17,16" fill="none" stroke="#2a2520" stroke-width="1"/>
    <path d="M6,16 L10,11 L14,16" fill="none" stroke="#2a2520" stroke-width="0.5"/>

    <text x="35" y="12" font-family="Georgia, serif" font-size="22" fill="#2a2520" font-weight="bold">SVcustos - SVperitus</text>
    <text x="35" y="30" font-family="Georgia, serif" font-size="12" fill="#6a6050">© Autor: Juan Antonio Lloret Egea, 2026</text>
  </g>
</svg>
