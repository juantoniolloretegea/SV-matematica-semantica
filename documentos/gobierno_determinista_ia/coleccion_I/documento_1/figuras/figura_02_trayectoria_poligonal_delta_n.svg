<!-- Título -->
<text x="600" y="46" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111827">Clasificación Γ_ℋ de la indeterminación, HNA y parámetro ΔN</text>

<!-- ===== PANEL SUPERIOR IZQUIERDO: Convergencia de posición con Γ_ℋ ===== -->
<rect x="36" y="64" width="560" height="400" rx="14" fill="#f8fafc" stroke="#16a34a" stroke-width="2"/>
