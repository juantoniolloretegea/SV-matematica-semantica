<rect x="338" y="649" width="66" height="56" rx="6" fill="#fef9c3" stroke="#d97706" stroke-width="2.5"/>
<text x="371" y="674" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#92400e" font-weight="700">S₄</text>
<text x="371" y="689" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#92400e">U fronteriza</text>

<!-- S5: cierre -->
<rect x="410" y="649" width="66" height="56" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="2.5"/>
<text x="443" y="674" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#15803d" font-weight="700">S₅ = n*</text>
<text x="443" y="689" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#15803d">U→ℓᵢ cerrada</text>

<!-- S6-S7: dentro ventana -->
<rect x="482" y="661" width="60" height="44" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
<text x="512" y="688" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#15803d">S₆</text>
<rect x="548" y="661" width="60" height="44" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
<text x="578" y="688" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#15803d">S₇=Sₖ</text>

<!-- Puntos suspensivos -->
<text x="640" y="688" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#6b7280">… … …</text>

<!-- Frame irreducible (alerta) -->
<rect x="740" y="641" width="130" height="72" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6,3"/>
<text x="805" y="665" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#dc2626" font-weight="700">⚠ U irreducible</text>
<text x="805" y="681" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#dc2626">ΔN = ∞ (sin vía)</text>
<text x="805" y="695" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#dc2626">ampliar ℋ antes</text>
<text x="805" y="707" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#dc2626">de ejecutar</text>

<!-- Flecha ventana activa -->
<line x1="266" y1="735" x2="608" y2="735" stroke="#0284c7" stroke-width="2.5"/>
<line x1="266" y1="727" x2="266" y2="743" stroke="#0284c7" stroke-width="2"/>
<line x1="608" y1="727" x2="608" y2="743" stroke="#0284c7" stroke-width="2"/>
<text x="437" y="755" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#0284c7">W(T,k) — ventana activa: solo posiciones no-irreducibles</text>

<!-- k total -->
<line x1="68" y1="773" x2="900" y2="773" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="480" y="789" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6b7280">k = longitud total de la trayectoria</text>

<!-- Leyenda Γ -->
<rect x="60" y="805" width="380" height="73" rx="8" fill="#f8fafc" stroke="#374151" stroke-width="1"/>
<text x="80" y="822" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#15803d" font-weight="700">● U resoluble</text>
<text x="160" y="822" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">→ ΔN finito, cierre garantizado por suceso</text>
<text x="80" y="841" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#92400e" font-weight="700">● U fronteriza</text>
<text x="160" y="841" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">→ ΔN finito, resultado depende del suceso</text>
<text x="80" y="860" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#dc2626" font-weight="700">⚠ U irreducible</text>
<text x="162" y="860" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">→ ΔN = ∞, ampliar ℋ antes de ejecutar</text>

<!-- Corolario -->
<rect x="460" y="805" width="706" height="73" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
<text x="820" y="824" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#0c4a6e" font-weight="700">Γ_ℋ es computable en O(n·|ℋ|) — diagnóstico previo a la ejecución (§4.5).</text>
<text x="820" y="843" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0c4a6e">Si 𝒰_irr = ∅, el gobierno es posible. Si 𝒰_irr ≠ ∅, el horizonte es insuficiente y debe ampliarse.</text>
<text x="820" y="862" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0c4a6e">|W(T,k)| = O(ΔN + |𝒰|) — el coste de memoria es estructural, no histórico (§5.2).</text>

