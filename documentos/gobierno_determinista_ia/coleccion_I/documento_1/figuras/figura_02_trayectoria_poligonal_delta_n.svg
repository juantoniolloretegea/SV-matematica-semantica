<!-- ===== PANEL INFERIOR: ΔN y ventana activa ===== -->
<rect x="36" y="491" width="1140" height="401" rx="14" fill="#f8fafc" stroke="#0284c7" stroke-width="2"/>
<text x="606" y="515" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0284c7">ΔN y ventana activa W(T,k) — con diagnóstico Γ_ℋ previo a la ejecución (§5.1–5.3)</text>

<!-- Eje horizontal trayectoria -->
<line x1="60" y1="711" x2="1140" y2="711" stroke="#374151" stroke-width="1.5"/>
