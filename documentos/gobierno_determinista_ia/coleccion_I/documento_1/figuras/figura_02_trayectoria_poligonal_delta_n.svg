<text x="251" y="214" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#92400e" font-weight="700">Γ_ℋ = resoluble</text>

<!-- Profundidad ΔN -->
<line x1="210" y1="368" x2="370" y2="368" stroke="#92400e" stroke-width="2"/>
<line x1="210" y1="362" x2="210" y2="374" stroke="#92400e" stroke-width="2"/>
