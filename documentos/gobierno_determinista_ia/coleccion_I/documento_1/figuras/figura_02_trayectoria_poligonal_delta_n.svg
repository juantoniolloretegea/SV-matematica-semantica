<rect x="266" y="649" width="66" height="56" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
<text x="299" y="674" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#15803d" font-weight="700">S₃</text>
<text x="299" y="689" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#15803d">U resoluble</text>

