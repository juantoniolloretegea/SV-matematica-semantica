<text x="290" y="388" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#92400e" font-weight="700">Δnᵢ = n* − n₀  (profundidad posicional)</text>

<!-- HNA note -->
<rect x="88" y="118" width="270" height="32" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
<text x="223" y="133" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#15803d">HNA (§4.1): no regresa a U después de n*</text>
<text x="223" y="146" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#15803d">Probado desde J3.2 + operador canónico</text>

<!-- ===== PANEL SUPERIOR DERECHO: Tres tipos de U + Lema de absorción ===== -->
<rect x="616" y="64" width="560" height="400" rx="14" fill="#f8fafc" stroke="#4f46e5" stroke-width="2"/>
<text x="896" y="88" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#4f46e5">Tres tipos de U según Γ_ℋ — y Lema de absorción</text>

<!-- Los tres tipos de U -->
<rect x="636" y="100" width="520" height="148" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
<text x="896" y="120" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#15803d">Γ_ℋ — Clasificación de la indeterminación (§3.2)</text>

<!-- Irreducible -->
<rect x="646" y="128" width="500" height="32" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
<text x="656" y="149" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#dc2626">U irreducible:</text>
<text x="750" y="149" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">ningún ε_j ∈ ℋ puede instanciar sobre i con valor en {0,1}</text>

<!-- Fronteriza -->
<rect x="646" y="164" width="500" height="32" rx="6" fill="#fef9c3" stroke="#d97706" stroke-width="1"/>
<text x="656" y="185" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#92400e">U fronteriza:</text>
<text x="740" y="185" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">existe ε_j que actúa, pero el valor (0 ó 1) depende del suceso</text>

<!-- Resoluble -->
<rect x="646" y="200" width="500" height="32" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
<text x="656" y="221" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#15803d">U resoluble:</text>
<text x="740" y="221" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">existe ε_j que instancia con valor determinado en {0,1}</text>

<!-- Teorema 1 -->
<rect x="636" y="244" width="520" height="28" rx="6" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1"/>
<text x="896" y="263" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#312e81" font-weight="700">Teorema 1 (§4.3): T converge estructuralmente ⟺ 𝒰_irr(T) = ∅</text>

<!-- Lema de absorción -->
<text x="896" y="294" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#4f46e5">Lema de absorción bajo compuerta conservadora ⊗ (§4.2)</text>

