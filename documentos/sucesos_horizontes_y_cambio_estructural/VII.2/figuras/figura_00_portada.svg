<svg viewBox='0 0 1200 800' width='1200' height='800' xmlns='http://www.w3.org/2000/svg' style='max-width:100%;display:block;background:#ffffff;'><rect width='1200' height='800' fill='#ffffff' stroke='#2d6a9f' stroke-width='2'/><rect x='0' y='0' width='1200' height='56' fill='#1a3a5c'/><text x='600' y='30' text-anchor='middle' fill='#ffffff' font-size='19' font-weight='bold' font-family='Georgia, serif'>VII.2 — Mapa de nociones relacionales</text><text x='600' y='50' text-anchor='middle' fill='#cccccc' font-size='13' font-family='Georgia, serif'>Comparabilidad · Afectación · Precedencia · Compatibilidad  ·  Σ = {0,1,U}  ·  célula (n,b) con n=b²</text><rect x='18' y='74' width='374' height='310' rx='6' fill='#ffffff' stroke='#2d6a9f' stroke-width='2'/><text x='205' y='104' text-anchor='middle' fill='#111111' font-size='17' font-weight='bold' font-family='Georgia, serif'>COMPARABILIDAD</text><text x='205' y='130' text-anchor='middle' fill='#111111' font-size='20' font-weight='bold' font-family='Courier New, monospace'>e ⊲⊳ f</text><line x1='30' y1='142' x2='380' y2='142' stroke='#2d6a9f' stroke-width='1'/><text x='205' y='172' text-anchor='middle' fill='#333333' font-size='16' font-weight='normal' font-family='Georgia, serif'>Dos sucesos pueden compararse</text><text x='205' y='210' text-anchor='middle' fill='#333333' font-size='16' font-weight='normal' font-family='Georgia, serif'>cuando existe un mecanismo de</text><text x='205' y='248' text-anchor='middle' fill='#333333' font-size='16' font-weight='normal' font-family='Georgia, serif'>transporte entre sus observables.</text><rect x='412' y='74' width='374' height='310' rx='6' fill='#ffffff' stroke='#2d6a9f' stroke-width='2'/><text x='599' y='104' text-anchor='middle' fill='#111111' font-size='17' font-weight='bold' font-family='Georgia, serif'>AFECTACIÓN</text><text x='599' y='130' text-anchor='middle' fill='#111111' font-size='20' font-weight='bold' font-family='Courier New, monospace'>e ⇝ f</text><line x1='424' y1='142' x2='774' y2='142' stroke='#2d6a9f' stroke-width='1'/><text x='599' y='172' text-anchor='middle' fill='#333333' font-size='16' font-weight='normal' font-family='Georgia, serif'>Un suceso afecta a otro cuando</text><text x='599' y='210' text-anchor='middle' fill='#333333' font-size='16' font-weight='normal' font-family='Georgia, serif'>su reevaluación cambia la evaluación</text><text x='599' y='248' text-anchor='middle' fill='#333333' font-size='16' font-weight='normal' font-family='Georgia, serif'>o la admisibilidad del segundo.</text><rect x='806' y='74' width='374' height='310' rx='6' fill='#ffffff' stroke='#2d6a9f' stroke-width='2'/><text x='993' y='104' text-anchor='middle' fill='#111111' font-size='17' font-weight='bold' font-family='Georgia, serif'>PRECEDENCIA</text><text x='993' y='130' text-anchor='middle' fill='#111111' font-size='20' font-weight='bold' font-family='Courier New, monospace'>e ≺ f</text><line x1='818' y1='142' x2='1168' y2='142' stroke='#2d6a9f' stroke-width='1'/><text x='993' y='172' text-anchor='middle' fill='#333333' font-size='16' font-weight='normal' font-family='Georgia, serif'>Un suceso precede a otro cuando</text><text x='993' y='210' text-anchor='middle' fill='#333333' font-size='16' font-weight='normal' font-family='Georgia, serif'>es condición necesaria para que</text><text x='993' y='248' text-anchor='middle' fill='#333333' font-size='16' font-weight='normal' font-family='Georgia, serif'>el segundo sea admisible.</text><line x1='394' y1='229' x2='400' y2='229' stroke='#111111' stroke-width='2.5' marker-end='url(#arr)'/><line x1='788' y1='229' x2='794' y2='229' stroke='#111111' stroke-width='2.5' marker-end='url(#arr)'/><rect x='18' y='402' width='1164' height='62' rx='5' fill='#eef5fc' stroke='#2d6a9f' stroke-width='1.5'/><text x='600' y='424' text-anchor='middle' fill='#111111' font-size='16' font-weight='bold' font-family='Georgia, serif'>COMPATIBILIDAD  e ∥ f:</text><text x='600' y='450' text-anchor='middle' fill='#333333' font-size='15' font-weight='normal' font-family='Georgia, serif'>Dos sucesos son compatibles cuando son comparables, no se afectan fuertemente entre sí, y sus observables son coevaluables.</text><rect x='18' y='476' width='1164' height='66' rx='5' fill='#1a3a5c'/><text x='600' y='502' text-anchor='middle' fill='#ffffff' font-size='17' font-weight='bold' font-family='Georgia, serif'>PROPOSICIÓN 7.5 — La precedencia es acíclica sobre Σⁿ = {0,1,U}ⁿ</text><text x='600' y='528' text-anchor='middle' fill='#cccccc' font-size='14' font-weight='normal' font-family='Georgia, serif'>Ningún ciclo puede formarse. Cada eslabón resuelve U; el cierre viola A2.</text><rect x='18' y='552' width='1164' height='26' rx='4' fill='#2d6a9f'/><text x='600' y='571' text-anchor='middle' fill='#ffffff' font-size='13' font-family='Georgia, serif'>Suelo: Frame S ∈ Σⁿ  ·  σ(e) ⊆ {1,...,n}  ·  Instancia canónica: b=3, n=9, posiciones P1–P9</text><rect x='0' y='774' width='1200' height='26' fill='#1a3a5c'/><text x='600' y='791' text-anchor='middle' fill='#ffffff' font-size='9' font-weight='bold' font-family='Georgia, serif'>Juan Antonio Lloret Egea | ORCID: 0000-0002-6634-3351 | Serie doctrinal: Sistama Vectorial SV | Instituto Tecnológico Virtual de la inteligencia Ariificial para el Español™ | IA eñ™ — La Bibila de la IA™ | ISSN: 2695-6411 | Madrid, 22 de marzo de 2026</text><defs><marker id='arr' markerWidth='12' markerHeight='12' refX='9' refY='5' orient='auto'><path d='M0,0 L0,10 L12,5 z' fill='#111111'/></marker></defs></svg>