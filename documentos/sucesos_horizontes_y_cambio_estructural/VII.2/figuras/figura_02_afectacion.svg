<svg viewBox='0 0 1200 800' width='1200' height='800' xmlns='http://www.w3.org/2000/svg' style='max-width:100%;display:block;background:#ffffff;'><rect width='1200' height='800' fill='#ffffff' stroke='#2d6a9f' stroke-width='2'/><rect x='0' y='0' width='1200' height='56' fill='#1a3a5c'/><text x='600' y='30' text-anchor='middle' fill='#ffffff' font-size='19' font-weight='bold' font-family='Georgia, serif'>Figura 2. Afectación débil y afectación fuerte</text><text x='600' y='50' text-anchor='middle' fill='#cccccc' font-size='13' font-family='Georgia, serif'>Defs. 6.1–6.2  ·  La distinción no es de tamaño sino de impacto sobre D_f</text><rect x='16' y='72' width='576' height='614' rx='5' fill='#eef5fc' stroke='#2d6a9f' stroke-width='2'/><text x='304' y='100' text-anchor='middle' fill='#111111' font-size='17' font-weight='bold' font-family='Georgia, serif'>AFECTACIÓN DÉBIL</text><text x='304' y='126' text-anchor='middle' fill='#111111' font-size='18' font-weight='normal' font-family='Courier New, monospace'>e ⇝_w f</text><line x1='28' y1='136' x2='580' y2='136' stroke='#aacce8' stroke-width='1'/><text x='36' y='177' text-anchor='start' fill='#333333' font-size='17' font-weight='normal' font-family='Georgia, serif'>Rₑ modifica la evaluación de F_f,</text><text x='36' y='256' text-anchor='start' fill='#333333' font-size='17' font-weight='normal' font-family='Georgia, serif'>pero D_f permanece intacto.</text><text x='36' y='335' text-anchor='start' fill='#333333' font-size='17' font-weight='normal' font-family='Georgia, serif'>f sigue siendo admisible.</text><text x='36' y='414' text-anchor='start' fill='#111111' font-size='17' font-weight='bold' font-family='Georgia, serif'>Ej. (9,3): e cambia P3 de U → 1.</text><text x='36' y='493' text-anchor='start' fill='#333333' font-size='17' font-weight='normal' font-family='Georgia, serif'>F₁ (nº posiciones=1) sube en 1.</text><text x='36' y='572' text-anchor='start' fill='#333333' font-size='17' font-weight='normal' font-family='Georgia, serif'>D_f exige P5=1 — no cambia → débil.</text><rect x='30' y='630' width='548' height='44' rx='4' fill='#d6e8f7' stroke='#2d6a9f' stroke-width='1'/><text x='304' y='656' text-anchor='middle' fill='#111111' font-size='15' font-weight='bold' font-family='Georgia, serif'>f sigue admisible  ·  D_fᵖᵒˢᵗ = D_f</text><rect x='608' y='72' width='576' height='614' rx='5' fill='#ffffff' stroke='#2d6a9f' stroke-width='3'/><text x='896' y='100' text-anchor='middle' fill='#111111' font-size='17' font-weight='bold' font-family='Georgia, serif'>AFECTACIÓN FUERTE</text><text x='896' y='126' text-anchor='middle' fill='#111111' font-size='18' font-weight='normal' font-family='Courier New, monospace'>e ⇝_s f</text><line x1='620' y1='136' x2='1172' y2='136' stroke='#aacce8' stroke-width='1'/><text x='628' y='177' text-anchor='start' fill='#333333' font-size='17' font-weight='normal' font-family='Georgia, serif'>Rₑ altera el dominio D_f:</text><text x='628' y='256' text-anchor='start' fill='#333333' font-size='17' font-weight='normal' font-family='Georgia, serif'>D_fᵖᵒˢᵗ ⊊ D_f  o  D_fᵖᵒˢᵗ = ∅.</text><text x='628' y='335' text-anchor='start' fill='#333333' font-size='17' font-weight='normal' font-family='Georgia, serif'>f puede perder toda aplicabilidad.</text><text x='628' y='414' text-anchor='start' fill='#111111' font-size='17' font-weight='bold' font-family='Georgia, serif'>Ej. (9,3): e cambia P5 de 1 → U.</text><text x='628' y='493' text-anchor='start' fill='#333333' font-size='17' font-weight='normal' font-family='Georgia, serif'>D_f = {S : P5=1} → D_fᵖᵒˢᵗ = ∅.</text><text x='628' y='572' text-anchor='start' fill='#333333' font-size='17' font-weight='normal' font-family='Georgia, serif'>Ningún frame cumple P5=1 → fuerte.</text><rect x='622' y='630' width='548' height='44' rx='4' fill='#d6e8f7' stroke='#2d6a9f' stroke-width='1'/><text x='896' y='656' text-anchor='middle' fill='#111111' font-size='15' font-weight='bold' font-family='Georgia, serif'>Prop. 6.4: e ⇝_s f  ⇏  f ⇝_s e  (no simétrica)</text><rect x='16' y='700' width='1168' height='58' rx='5' fill='#1a3a5c'/><text x='600' y='722' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='bold' font-family='Georgia, serif'>Proposición 6.5 — Afectación fuerte ⟹ débil (bajo comparabilidad). La implicación no se invierte.</text><rect x='18' y='732' width='1164' height='22' rx='3' fill='#2d6a9f'/><text x='600' y='746' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='normal' font-family='Georgia, serif'>Llevar posiciones a U incrementa k(τ); resolver U → {0,1} reduce la indeterminación del frame.</text><rect x='0' y='774' width='1200' height='26' fill='#1a3a5c'/><text x='600' y='791' text-anchor='middle' fill='#ffffff' font-size='9' font-weight='bold' font-family='Georgia, serif'>Juan Antonio Lloret Egea | ORCID: 0000-0002-6634-3351 | Serie doctrinal: Sistama Vectorial SV | Instituto Tecnológico Virtual de la inteligencia Ariificial para el Español™ | IA eñ™ — La Bibila de la IA™ | ISSN: 2695-6411 | Madrid, 22 de marzo de 2026</text><defs><marker id='arr' markerWidth='12' markerHeight='12' refX='9' refY='5' orient='auto'><path d='M0,0 L0,10 L12,5 z' fill='#111111'/></marker></defs></svg>