<svg viewBox='0 0 1200 800' width='1200' height='800' xmlns='http://www.w3.org/2000/svg' style='max-width:100%;display:block;background:#ffffff;'><rect width='1200' height='800' fill='#ffffff' stroke='#2d6a9f' stroke-width='2'/><rect x='0' y='0' width='1200' height='56' fill='#1a3a5c'/><text x='600' y='30' text-anchor='middle' fill='#ffffff' font-size='19' font-weight='bold' font-family='Georgia, serif'>Figura 1. Comparabilidad legítima</text><text x='600' y='50' text-anchor='middle' fill='#cccccc' font-size='13' font-family='Georgia, serif'>Definición 5.2  ·  Dos sucesos son comparables si existe un dato de transporte válido</text><rect x='16' y='72' width='196' height='464' rx='5' fill='#eef5fc' stroke='#2d6a9f' stroke-width='2'/><text x='114' y='100' text-anchor='middle' fill='#111111' font-size='17' font-weight='bold' font-family='Georgia, serif'>Suceso e</text><text x='114' y='124' text-anchor='middle' fill='#333333' font-size='13' font-weight='normal' font-family='Courier New, monospace'>(H, H′, σₑ, Rₑ)</text><line x1='26' y1='134' x2='202' y2='134' stroke='#aacce8' stroke-width='1'/><text x='30' y='158' text-anchor='start' fill='#333333' font-size='15' font-weight='normal' font-family='Georgia, serif'>σₑ ⊆ {P1…P9}</text><text x='30' y='196' text-anchor='start' fill='#333333' font-size='15' font-weight='normal' font-family='Georgia, serif'>A1–A6 satisfechas</text><text x='30' y='234' text-anchor='start' fill='#333333' font-size='15' font-weight='normal' font-family='Georgia, serif'>Ej. (9,3):</text><text x='30' y='272' text-anchor='start' fill='#333333' font-size='15' font-weight='normal' font-family='Georgia, serif'>σₑ = {P3, P8}</text><rect x='988' y='72' width='196' height='464' rx='5' fill='#eef5fc' stroke='#2d6a9f' stroke-width='2'/><text x='1086' y='100' text-anchor='middle' fill='#111111' font-size='17' font-weight='bold' font-family='Georgia, serif'>Suceso f</text><text x='1086' y='124' text-anchor='middle' fill='#333333' font-size='13' font-weight='normal' font-family='Courier New, monospace'>(G, G′, σ_f, R_f)</text><line x1='998' y1='134' x2='1174' y2='134' stroke='#aacce8' stroke-width='1'/><text x='1002' y='158' text-anchor='start' fill='#333333' font-size='15' font-weight='normal' font-family='Georgia, serif'>σ_f ⊆ {P1…P9}</text><text x='1002' y='196' text-anchor='start' fill='#333333' font-size='15' font-weight='normal' font-family='Georgia, serif'>A1–A6 satisfechas</text><text x='1002' y='234' text-anchor='start' fill='#333333' font-size='15' font-weight='normal' font-family='Georgia, serif'>Ej. (9,3):</text><text x='1002' y='272' text-anchor='start' fill='#333333' font-size='15' font-weight='normal' font-family='Georgia, serif'>σ_f = {P6, P7}</text><rect x='230' y='72' width='740' height='464' rx='5' fill='#ffffff' stroke='#2d6a9f' stroke-width='2.5'/><text x='600' y='100' text-anchor='middle' fill='#111111' font-size='17' font-weight='bold' font-family='Georgia, serif'>DATO DE TRANSPORTE</text><text x='600' y='124' text-anchor='middle' fill='#333333' font-size='14' font-weight='normal' font-family='Courier New, monospace'>(Jₑ꜀, Θₑ꜀, ℱₑ, ℱ_f)</text><line x1='242' y1='134' x2='958' y2='134' stroke='#aacce8' stroke-width='1'/><text x='248' y='160' text-anchor='start' fill='#333333' font-size='15' font-weight='normal' font-family='Georgia, serif'>· Jₑ꜀ ⊆ {1,...,n} — posiciones comunes no afectadas por ninguno</text><text x='248' y='202' text-anchor='start' fill='#333333' font-size='15' font-weight='normal' font-family='Georgia, serif'>· Θₑ꜀ : ℱₑ → ℱ_f — traduce observables al mismo escalar 𝕂</text><text x='248' y='244' text-anchor='start' fill='#333333' font-size='15' font-weight='normal' font-family='Georgia, serif'>· Δₑ Fₑ(x) − Δ_f F_f(y) ∈ 𝕂 — diferencia eventiva bien definida</text><line x1='242' y1='466' x2='958' y2='466' stroke='#aacce8' stroke-width='1'/><text x='600' y='492' text-anchor='middle' fill='#111111' font-size='16' font-weight='bold' font-family='Courier New, monospace'>e ⊲⊳ f  ⟺  existe al menos un dato de transporte válido</text><rect x='300' y='500' width='664' height='24' rx='4' fill='#2d6a9f'/><text x='632' y='518' text-anchor='middle' fill='#ffffff' font-size='13' font-family='Georgia, serif'>(Definición 5.2)</text><line x1='214' y1='304' x2='214' y2='304' stroke='#111111' stroke-width='2.5' marker-end='url(#arr)'/><line x1='972' y1='304' x2='972' y2='304' stroke='#111111' stroke-width='2.5' marker-end='url(#arr)'/><rect x='16' y='548' width='1168' height='58' rx='5' fill='#eef5fc' stroke='#2d6a9f' stroke-width='1.5'/><text x='600' y='568' text-anchor='middle' fill='#111111' font-size='15' font-weight='bold' font-family='Georgia, serif'>Ejemplo en la célula (9,3):</text><text x='600' y='592' text-anchor='middle' fill='#333333' font-size='14' font-weight='normal' font-family='Georgia, serif'>σ(e)={P3,P8} · σ(f)={P6,P7} · Jₑ꜀={P1,P2,P4,P5,P9} · Θₑ꜀=identidad → e ⊲⊳ f</text><rect x='16' y='618' width='1168' height='58' rx='5' fill='#1a3a5c' stroke='#1a3a5c' stroke-width='1.5'/><text x='600' y='638' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='bold' font-family='Georgia, serif'>Proposición 5.4 — No todo par de sucesos admisibles es comparable</text><text x='600' y='662' text-anchor='middle' fill='#cccccc' font-size='14' font-weight='normal' font-family='Georgia, serif'>Si σ(e) opera sobre posiciones en U sin observable numérico, no existe Θ. El par no es comparable.</text><rect x='16' y='688' width='1168' height='58' rx='5' fill='#eef5fc' stroke='#2d6a9f' stroke-width='1.5'/><text x='600' y='708' text-anchor='middle' fill='#111111' font-size='15' font-weight='bold' font-family='Georgia, serif'>Obs. 5.3 — La comparabilidad puede no ser simétrica:</text><text x='600' y='732' text-anchor='middle' fill='#333333' font-size='14' font-weight='normal' font-family='Georgia, serif'>la existencia de transporte de e a f no garantiza transporte de f a e.</text><rect x='0' y='774' width='1200' height='26' fill='#1a3a5c'/><text x='600' y='791' text-anchor='middle' fill='#ffffff' font-size='9' font-weight='bold' font-family='Georgia, serif'>Juan Antonio Lloret Egea | ORCID: 0000-0002-6634-3351 | Serie doctrinal: Sistama Vectorial SV | Instituto Tecnológico Virtual de la inteligencia Ariificial para el Español™ | IA eñ™ — La Bibila de la IA™ | ISSN: 2695-6411 | Madrid, 22 de marzo de 2026</text><defs><marker id='arr' markerWidth='12' markerHeight='12' refX='9' refY='5' orient='auto'><path d='M0,0 L0,10 L12,5 z' fill='#111111'/></marker></defs></svg>