<svg viewBox='0 0 1200 800' width='1200' height='800' xmlns='http://www.w3.org/2000/svg' style='max-width:100%;display:block;background:#ffffff;'><rect width='1200' height='800' fill='#ffffff' stroke='#2d6a9f' stroke-width='2'/><rect x='0' y='0' width='1200' height='56' fill='#1a3a5c'/><text x='600' y='30' text-anchor='middle' fill='#ffffff' font-size='19' font-weight='bold' font-family='Georgia, serif'>Figura 3. Precedencia estructural — Proposición 7.5</text><text x='600' y='50' text-anchor='middle' fill='#cccccc' font-size='13' font-family='Georgia, serif'>e ≺ f cuando e es condición necesaria de admisibilidad de f  ·  Sin reloj. La U es el mecanismo de habilitación.</text><rect x='16' y='72' width='450' height='606' rx='5' fill='#eef5fc' stroke='#2d6a9f' stroke-width='2'/><text x='241' y='100' text-anchor='middle' fill='#111111' font-size='17' font-weight='bold' font-family='Georgia, serif'>DEFINICIÓN</text><text x='241' y='126' text-anchor='middle' fill='#111111' font-size='22' font-weight='normal' font-family='Courier New, monospace'>e ≺ f</text><line x1='28' y1='138' x2='454' y2='138' stroke='#aacce8' stroke-width='1'/><text x='241' y='160' text-anchor='middle' fill='#333333' font-size='15' font-weight='normal' font-family='Georgia, serif'>Tres condiciones simultáneas:</text><rect x='30' y='176' width='422' height='56' rx='4' fill='#ffffff' stroke='#2d6a9f' stroke-width='1.5'/><text x='50' y='198' text-anchor='start' fill='#111111' font-size='15' font-weight='bold' font-family='Georgia, serif'>(1)</text><text x='96' y='198' text-anchor='start' fill='#111111' font-size='17' font-weight='bold' font-family='Courier New, monospace'>e ⊲⊳ f</text><text x='50' y='220' text-anchor='start' fill='#333333' font-size='13' font-weight='normal' font-family='Georgia, serif'>comparabilidad legítima</text><rect x='30' y='240' width='422' height='56' rx='4' fill='#ffffff' stroke='#2d6a9f' stroke-width='1.5'/><text x='50' y='262' text-anchor='start' fill='#111111' font-size='15' font-weight='bold' font-family='Georgia, serif'>(2)</text><text x='96' y='262' text-anchor='start' fill='#111111' font-size='17' font-weight='bold' font-family='Courier New, monospace'>e ⇝_s f</text><text x='50' y='284' text-anchor='start' fill='#333333' font-size='13' font-weight='normal' font-family='Georgia, serif'>afectación fuerte sobre D_f</text><rect x='30' y='304' width='422' height='56' rx='4' fill='#ffffff' stroke='#2d6a9f' stroke-width='1.5'/><text x='50' y='326' text-anchor='start' fill='#111111' font-size='15' font-weight='bold' font-family='Georgia, serif'>(3)</text><text x='96' y='326' text-anchor='start' fill='#111111' font-size='17' font-weight='bold' font-family='Courier New, monospace'>D_fᵖʳᵉ=∅,  D_fᵖᵒˢᵗ≠∅</text><text x='50' y='348' text-anchor='start' fill='#333333' font-size='13' font-weight='normal' font-family='Georgia, serif'>f imposible antes; posible después</text><rect x='30' y='378' width='422' height='82' rx='4' fill='#d6e8f7' stroke='#aacce8' stroke-width='1'/><text x='241' y='398' text-anchor='middle' fill='#111111' font-size='15' font-weight='bold' font-family='Georgia, serif'>Instancia (9,3):</text><text x='241' y='422' text-anchor='middle' fill='#333333' font-size='15' font-weight='normal' font-family='Georgia, serif'>e: P3 de U → 1  ·  f requiere P3=1</text><text x='241' y='444' text-anchor='middle' fill='#111111' font-size='15' font-weight='normal' font-family='Georgia, serif'>D_fᵖʳᵉ=∅,  D_fᵖᵒˢᵗ≠∅  ⟹  e ≺ f</text><rect x='30' y='470' width='422' height='196' rx='4' fill='#1a3a5c'/><text x='241' y='574' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='bold' font-family='Georgia, serif'>Prop. 7.3: afectar fuertemente ≠ preceder</text><rect x='482' y='72' width='702' height='606' rx='5' fill='#ffffff' stroke='#2d6a9f' stroke-width='2.5'/><text x='833' y='100' text-anchor='middle' fill='#111111' font-size='17' font-weight='bold' font-family='Georgia, serif'>ACICLICIDAD</text><text x='833' y='124' text-anchor='middle' fill='#2d6a9f' font-size='14' font-weight='normal' font-family='Georgia, serif'>Proposición 7.5</text><line x1='494' y1='134' x2='1172' y2='134' stroke='#aacce8' stroke-width='1'/><circle cx='562' cy='208' r='44' fill='#1a3a5c'/><text x='562' y='216' text-anchor='middle' fill='#ffffff' font-size='20' font-weight='bold' font-family='Courier New, monospace'>e₁</text><circle cx='833' cy='208' r='44' fill='#1a3a5c'/><text x='833' y='216' text-anchor='middle' fill='#ffffff' font-size='20' font-weight='bold' font-family='Courier New, monospace'>e₂</text><circle cx='1104' cy='208' r='44' fill='#1a3a5c'/><text x='1104' y='216' text-anchor='middle' fill='#ffffff' font-size='20' font-weight='bold' font-family='Courier New, monospace'>e₃</text><line x1='606' y1='208' x2='775' y2='208' stroke='#111111' stroke-width='3' marker-end='url(#arr)'/><line x1='877' y1='208' x2='1046' y2='208' stroke='#111111' stroke-width='3' marker-end='url(#arr)'/><text x='833' y='276' text-anchor='middle' fill='#333333' font-size='15' font-weight='bold' font-family='Georgia, serif'>cadena válida ✓</text><path d='M 1138 228 Q 833 336 528 228' fill='none' stroke='#666666' stroke-width='2' stroke-dasharray='8,5'/><text x='833' y='332' text-anchor='middle' fill='#2d6a9f' font-size='14' font-weight='normal' font-family='Georgia, serif'>ciclo imposible ✗</text><text x='833' y='354' text-anchor='middle' fill='#2d6a9f' font-size='13' font-weight='normal' font-family='Georgia, serif'>D_{e₁}ᵖʳᵉ=∅ violaría A2</text><rect x='496' y='368' width='674' height='298' rx='4' fill='#d6e8f7' stroke='#aacce8' stroke-width='1'/><text x='833' y='390' text-anchor='middle' fill='#111111' font-size='15' font-weight='bold' font-family='Georgia, serif'>Por qué no hay ciclos:</text><text x='833' y='418' text-anchor='middle' fill='#333333' font-size='14' font-weight='normal' font-family='Georgia, serif'>Cada eᵢ resuelve U para e_{i+1}.</text><text x='833' y='448' text-anchor='middle' fill='#333333' font-size='14' font-weight='normal' font-family='Georgia, serif'>El cierre exige D_{e₁}ᵖʳᵉ = ∅.</text><text x='833' y='478' text-anchor='middle' fill='#333333' font-size='14' font-weight='normal' font-family='Georgia, serif'>Contradice A2: Dₑ ≠ ∅ por definición.</text><rect x='16' y='692' width='1168' height='66' rx='5' fill='#1a3a5c'/><text x='600' y='718' text-anchor='middle' fill='#ffffff' font-size='17' font-weight='bold' font-family='Georgia, serif'>Proposición 7.5 — La precedencia es acíclica en toda familia finita sobre Σⁿ</text><text x='600' y='744' text-anchor='middle' fill='#cccccc' font-size='14' font-weight='normal' font-family='Georgia, serif'>Sin reloj. Sin tiempo fuerte. La U es el mecanismo de habilitación.</text><text x='600' y='768' text-anchor='middle' fill='#2d6a9f' font-size='13' font-weight='normal' font-family='Georgia, serif'>Prop. 7.4 — Irreflexividad: e ⊀ e  ·  Prop. 7.3 — Precedencia ⟹ fuerte; no recíproca</text><rect x='0' y='774' width='1200' height='26' fill='#1a3a5c'/><text x='600' y='791' text-anchor='middle' fill='#ffffff' font-size='9' font-weight='bold' font-family='Georgia, serif'>Juan Antonio Lloret Egea | ORCID: 0000-0002-6634-3351 | Serie doctrinal: Sistama Vectorial SV | Instituto Tecnológico Virtual de la inteligencia Ariificial para el Español™ | IA eñ™ — La Bibila de la IA™ | ISSN: 2695-6411 | Madrid, 22 de marzo de 2026</text><defs><marker id='arr' markerWidth='12' markerHeight='12' refX='9' refY='5' orient='auto'><path d='M0,0 L0,10 L12,5 z' fill='#111111'/></marker></defs></svg>