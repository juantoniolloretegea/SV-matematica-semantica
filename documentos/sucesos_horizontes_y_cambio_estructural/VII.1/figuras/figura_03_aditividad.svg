<svg viewBox='0 0 900 300' xmlns='http://www.w3.org/2000/svg' style='max-width:100%;display:block;'><rect width='900' height='300' rx='8' fill='#ffffff' stroke='#2d6a9f' stroke-width='1.5'/><rect x='0' y='0' width='900' height='38' fill='#1a3a5c' rx='8'/><rect x='0' y='30' width='900' height='8' fill='#1a3a5c'/><text x='450' y='25' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='bold' font-family='Georgia, serif'>Figura 3. Aditividad de la acumulacion eventiva (Prop. 7.2)</text><rect x='20' y='55' width='400' height='108' rx='8' fill='#eef5fc' stroke='#2d6a9f' stroke-width='1.5'/><text x='220' y='78' text-anchor='middle' font-weight='bold' fill='#1a3a5c' font-size='12' font-family='Georgia, serif'>Cadena gamma1 = (e1, ..., em)</text><text x='220' y='98' text-anchor='middle' fill='#1a3a5c' font-size='11' font-family='Courier New, monospace'>A(g1; F, x0) = sum Delta_{ei} F(xi)</text><text x='220' y='118' text-anchor='middle' fill='#6b7c8d' font-size='10' font-family='Georgia, serif'>estado final: x_{m+1} = R_em(xm)</text><rect x='480' y='55' width='400' height='108' rx='8' fill='#eef5fc' stroke='#2d6a9f' stroke-width='1.5'/><text x='680' y='78' text-anchor='middle' font-weight='bold' fill='#1a3a5c' font-size='12' font-family='Georgia, serif'>Cadena gamma2 = (f1, ..., fn)</text><text x='680' y='98' text-anchor='middle' fill='#1a3a5c' font-size='11' font-family='Courier New, monospace'>A(g2; F, x_m+1) = sum Delta_{fj} F(yj)</text><text x='680' y='118' text-anchor='middle' fill='#6b7c8d' font-size='10' font-family='Georgia, serif'>estado inicial: y1 = x_{m+1}</text><text x='450' y='192' text-anchor='middle' fill='#1a3a5c' font-weight='bold' font-size='13' font-family='Georgia, serif'>Concatenacion admisible: gamma1 . gamma2</text><rect x='60' y='202' width='780' height='56' rx='6' fill='#1a3a5c'/><text x='450' y='226' text-anchor='middle' fill='#ffffff' font-size='13' font-family='Courier New, monospace'>A(g1.g2; F, x0) = A(g1; F, x0) + A(g2; F, x_m+1)</text><text x='450' y='247' text-anchor='middle' fill='#aacce8' font-size='11' font-family='Georgia, serif'>Proposicion 7.2 - la particion debe respetar la composabilidad de horizontes</text><rect x='0' y='270' width='900' height='22' fill='#1a3a5c'/><text x='450' y='285' text-anchor='middle' fill='#ffffff' font-size='10' font-family='Georgia, serif'>Juan Antonio Lloret Egea · ORCID 0000-0002-6634-3351 · ITVIA · ISSN 2695-6411</text><defs><marker id='a1' markerWidth='8' markerHeight='8' refX='6' refY='3' orient='auto'><path d='M0,0 L0,6 L8,3 z' fill='#2d6a9f'/></marker><marker id='a2' markerWidth='8' markerHeight='8' refX='6' refY='3' orient='auto'><path d='M0,0 L0,6 L8,3 z' fill='#1a3a5c'/></marker></defs></svg>