<svg viewBox='0 0 900 332' xmlns='http://www.w3.org/2000/svg' style='max-width:100%;display:block;'><rect width='900' height='332' rx='8' fill='#ffffff' stroke='#2d6a9f' stroke-width='1.5'/><rect x='0' y='0' width='900' height='38' fill='#1a3a5c' rx='8'/><rect x='0' y='30' width='900' height='8' fill='#1a3a5c'/><text x='450' y='25' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='bold' font-family='Georgia, serif'>Figura 2. Suceso neutro local y distincion de estatutos</text><rect x='20' y='55' width='400' height='210' rx='8' fill='#eef5fc' stroke='#2d6a9f' stroke-width='1.5'/><text x='220' y='78' text-anchor='middle' font-weight='bold' fill='#1a3a5c' font-size='13' font-family='Georgia, serif'>Suceso admisible e</text><text x='220' y='97' text-anchor='middle' fill='#1a3a5c' font-size='11' font-family='Courier New, monospace'>e = (H, H', sigma, Re)</text><text x='50' y='122' fill='#6b7c8d' font-size='11' font-family='Georgia, serif'>· sigma no vacia (soporte declarado)</text><text x='50' y='142' fill='#6b7c8d' font-size='11' font-family='Georgia, serif'>· A4: existe x, F con Delta_e F(x) != 0</text><text x='50' y='162' fill='#6b7c8d' font-size='11' font-family='Georgia, serif'>· A5: control exterior Ce declarado</text><text x='50' y='182' fill='#6b7c8d' font-size='11' font-family='Georgia, serif'>· Reevaluacion efectiva no trivial</text><rect x='50' y='214' width='340' height='34' rx='5' fill='#2d6a9f'/><text x='220' y='235' text-anchor='middle' fill='#ffffff' font-size='11' font-family='Georgia, serif'>Estatuto: suceso admisible (Def. 6.4)</text><rect x='480' y='55' width='400' height='210' rx='8' fill='#fff8e8' stroke='#c8961a' stroke-width='1.5'/><text x='680' y='78' text-anchor='middle' font-weight='bold' fill='#7a5800' font-size='13' font-family='Georgia, serif'>Suceso neutro local 1_H</text><text x='680' y='97' text-anchor='middle' fill='#7a5800' font-size='11' font-family='Courier New, monospace'>1_H = (H, H, vacio, id_XH)</text><text x='510' y='122' fill='#6b7c8d' font-size='11' font-family='Georgia, serif'>· sigma = vacio (soporte vacio)</text><text x='510' y='142' fill='#6b7c8d' font-size='11' font-family='Georgia, serif'>· A4 violada: Delta F(x) = 0 para todo x</text><text x='510' y='162' fill='#6b7c8d' font-size='11' font-family='Georgia, serif'>· No hay afectacion efectiva</text><text x='510' y='182' fill='#6b7c8d' font-size='11' font-family='Georgia, serif'>· e o 1_H = e  y  1_H' o e = e</text><rect x='510' y='214' width='340' height='34' rx='5' fill='#c8961a'/><text x='680' y='235' text-anchor='middle' fill='#ffffff' font-size='11' font-family='Georgia, serif'>Estatuto: elemento neutro estructural</text><line x1='450' y1='60' x2='450' y2='265' stroke='#6b7c8d' stroke-width='1' stroke-dasharray='4,4'/><text x='455' y='170' fill='#6b7c8d' font-size='26' font-weight='bold'>&#x2260;</text><text x='450' y='288' text-anchor='middle' fill='#1a3a5c' font-size='11' font-style='italic' font-family='Georgia, serif'>La distincion de estatutos no es un parche; evita que A4 sea falsificada (Obs. 5.3)</text><rect x='0' y='302' width='900' height='22' fill='#1a3a5c'/><text x='450' y='317' text-anchor='middle' fill='#ffffff' font-size='10' font-family='Georgia, serif'>Juan Antonio Lloret Egea · ORCID 0000-0002-6634-3351 · ITVIA · ISSN 2695-6411</text><defs><marker id='a1' markerWidth='8' markerHeight='8' refX='6' refY='3' orient='auto'><path d='M0,0 L0,6 L8,3 z' fill='#2d6a9f'/></marker><marker id='a2' markerWidth='8' markerHeight='8' refX='6' refY='3' orient='auto'><path d='M0,0 L0,6 L8,3 z' fill='#1a3a5c'/></marker></defs></svg>