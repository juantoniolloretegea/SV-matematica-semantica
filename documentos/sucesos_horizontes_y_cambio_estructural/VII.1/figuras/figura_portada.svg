<svg viewBox='0 0 900 298' xmlns='http://www.w3.org/2000/svg' style='max-width:100%;display:block;'><rect width='900' height='298' rx='8' fill='#ffffff' stroke='#2d6a9f' stroke-width='1.5'/><rect x='0' y='0' width='900' height='38' fill='#1a3a5c' rx='8'/><rect x='0' y='30' width='900' height='8' fill='#1a3a5c'/><text x='450' y='25' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='bold' font-family='Georgia, serif'>Algebra de composicion de sucesos admisibles</text><text x='450' y='52' text-anchor='middle' fill='#aacce8' font-size='11' font-family='Georgia, serif'>Sistema Vectorial SV - Primer resultado algebraico cerrado</text><rect x='20' y='68' width='270' height='100' rx='8' fill='#eef5fc' stroke='#2d6a9f' stroke-width='1.5'/><text x='155' y='90' text-anchor='middle' font-weight='bold' fill='#1a3a5c' font-size='12' font-family='Georgia, serif'>Suceso admisible</text><text x='155' y='109' text-anchor='middle' fill='#1a3a5c' font-size='11' font-family='Courier New, monospace'>e = (H, H', s, Re)</text><text x='155' y='130' text-anchor='middle' fill='#6b7c8d' font-size='10' font-family='Georgia, serif'>A1-A6 satisfechas</text><text x='155' y='148' text-anchor='middle' fill='#6b7c8d' font-size='10' font-family='Georgia, serif'>Delta_e F(x) bien tipada</text><rect x='310' y='68' width='270' height='100' rx='8' fill='#eef5fc' stroke='#2d6a9f' stroke-width='1.5'/><text x='445' y='90' text-anchor='middle' font-weight='bold' fill='#1a3a5c' font-size='12' font-family='Georgia, serif'>Composicion</text><text x='445' y='109' text-anchor='middle' fill='#1a3a5c' font-size='11' font-family='Courier New, monospace'>e2 o e1 = (H0,H2,s12,R)</text><text x='445' y='130' text-anchor='middle' fill='#6b7c8d' font-size='10' font-family='Georgia, serif'>Preserva A1-A6</text><text x='445' y='148' text-anchor='middle' fill='#6b7c8d' font-size='10' font-family='Georgia, serif'>Asociativa bajo compatibilidad</text><rect x='600' y='68' width='270' height='100' rx='8' fill='#eef5fc' stroke='#2d6a9f' stroke-width='1.5'/><text x='735' y='90' text-anchor='middle' font-weight='bold' fill='#1a3a5c' font-size='12' font-family='Georgia, serif'>Semigrupoid parcial</text><text x='735' y='109' text-anchor='middle' fill='#1a3a5c' font-size='11' font-family='Courier New, monospace'>(E u N, o)</text><text x='735' y='130' text-anchor='middle' fill='#6b7c8d' font-size='10' font-family='Georgia, serif'>Neutros locales 1_H</text><text x='735' y='148' text-anchor='middle' fill='#6b7c8d' font-size='10' font-family='Georgia, serif'>Acumulacion aditiva</text><text x='450' y='202' text-anchor='middle' fill='#1a3a5c' font-size='12' font-style='italic' font-family='Georgia, serif'>Aditividad de la acumulacion eventiva - Proposicion 7.2</text><rect x='60' y='212' width='780' height='46' rx='6' fill='#d6e8f7' stroke='#2d6a9f' stroke-width='1'/><text x='450' y='230' text-anchor='middle' fill='#1a3a5c' font-size='12' font-family='Courier New, monospace'>A(g1.g2; F, x0) = A(g1; F, x0) + A(g2; F, x_m+1)</text><text x='450' y='248' text-anchor='middle' fill='#6b7c8d' font-size='11' font-family='Georgia, serif'>Cadenas admisibles cuya concatenacion preserva la composabilidad de horizontes</text><rect x='0' y='268' width='900' height='22' fill='#1a3a5c'/><text x='450' y='283' text-anchor='middle' fill='#ffffff' font-size='10' font-family='Georgia, serif'>Juan Antonio Lloret Egea · ORCID 0000-0002-6634-3351 · ITVIA · ISSN 2695-6411</text><defs><marker id='a1' markerWidth='8' markerHeight='8' refX='6' refY='3' orient='auto'><path d='M0,0 L0,6 L8,3 z' fill='#2d6a9f'/></marker><marker id='a2' markerWidth='8' markerHeight='8' refX='6' refY='3' orient='auto'><path d='M0,0 L0,6 L8,3 z' fill='#1a3a5c'/></marker></defs></svg>