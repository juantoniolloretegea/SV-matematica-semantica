<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
<rect width="1200" height="800" fill="#ffffff"/>
<text x="70" y="80" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#10263b">Figura 1. Núcleo tipado del dato de enlace Λ</text>
<rect x="70" y="170" width="240" height="300" rx="22" fill="#f4f6f8" stroke="#10263b" stroke-width="3"/>
<text x="190" y="215" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700" fill="#10263b">A</text>
<text x="190" y="255" text-anchor="middle" font-family="Arial" font-size="20" fill="#10263b">acumulación previa</text>
<text x="190" y="300" text-anchor="middle" font-family="Arial" font-size="22" fill="#10263b">S_A = soporte declarado</text>
<rect x="120" y="335" width="140" height="80" rx="16" fill="#ffffff" stroke="#10263b" stroke-width="2"/>
<text x="190" y="382" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700" fill="#10263b">J_Λ</text>
<text x="190" y="438" text-anchor="middle" font-family="Arial" font-size="18" fill="#10263b">dominio enlazable</text>

<rect x="455" y="170" width="290" height="300" rx="22" fill="#f4f6f8" stroke="#10263b" stroke-width="3"/>
<text x="600" y="215" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700" fill="#10263b">Λ = (J_Λ, Θ_Λ, Π_Λ)</text>
<line x1="505" y1="255" x2="695" y2="255" stroke="#10263b" stroke-width="2"/>
<text x="600" y="305" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700" fill="#10263b">Θ_Λ</text>
<text x="600" y="338" text-anchor="middle" font-family="Arial" font-size="18" fill="#10263b">transporte parcial tipado</text>
<text x="600" y="392" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700" fill="#10263b">Π_Λ</text>
<text x="600" y="425" text-anchor="middle" font-family="Arial" font-size="18" fill="#10263b">proyección de herencia</text>

<rect x="890" y="170" width="240" height="300" rx="22" fill="#f4f6f8" stroke="#10263b" stroke-width="3"/>
<text x="1010" y="215" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700" fill="#10263b">B</text>
<text x="1010" y="255" text-anchor="middle" font-family="Arial" font-size="20" fill="#10263b">acumulación sucesora</text>
<text x="1010" y="300" text-anchor="middle" font-family="Arial" font-size="22" fill="#10263b">S_B = soporte declarado</text>
<rect x="940" y="335" width="140" height="80" rx="16" fill="#ffffff" stroke="#10263b" stroke-width="2"/>
<text x="1010" y="382" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#10263b">H_B ∪ {0}</text>
<text x="1010" y="438" text-anchor="middle" font-family="Arial" font-size="18" fill="#10263b">datos herederos aceptables</text>

<path d="M 260 375 C 345 375, 365 375, 450 375" fill="none" stroke="#10263b" stroke-width="4" marker-end="url(#arrow)"/>
<path d="M 745 305 C 810 305, 825 255, 890 255" fill="none" stroke="#10263b" stroke-width="4" marker-end="url(#arrow)"/>
<path d="M 745 392 C 810 392, 825 392, 890 392" fill="none" stroke="#10263b" stroke-width="4" marker-end="url(#arrow)"/>

<text x="600" y="585" text-anchor="middle" font-family="Arial" font-size="24" fill="#10263b">El enlace no se presume: debe declarar qué parte de A es enlazable, cómo se transporta y qué hereda realmente B.</text>
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
<path d="M0,0 L12,6 L0,12 z" fill="#10263b"/>
</marker>
</defs>
</svg>