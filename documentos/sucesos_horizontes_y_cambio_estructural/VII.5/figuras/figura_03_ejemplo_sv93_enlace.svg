<rect x="375" y="545" width="450" height="120" rx="24" fill="#f4f6f8" stroke="#10263b" stroke-width="3"/>
<text x="600" y="595" text-anchor="middle" font-family="Arial" font-size="26" font-weight="700" fill="#10263b">Dictamen: reinicialización con memoria</text>
<text x="600" y="632" text-anchor="middle" font-family="Arial" font-size="20" fill="#10263b">No hay separación completa ni enlace fuerte. La herencia es parcial, tipada y limitada.</text>

