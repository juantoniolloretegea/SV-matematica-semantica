<svg viewBox='0 0 1200 800' width='1200' height='800' xmlns='http://www.w3.org/2000/svg' style='max-width:100%;display:block;background:#ffffff;'>
<rect width='1200' height='800' fill='#ffffff' stroke='#2d6a9f' stroke-width='2'/>

<!-- Header -->
<rect x='0' y='0' width='1200' height='56' fill='#1a3a5c'/>
<text x='600' y='30' text-anchor='middle' fill='#ffffff' font-size='19' font-weight='bold' font-family='Georgia, serif'>Figura 3. Regímenes de paso</text>
<text x='600' y='50' text-anchor='middle' fill='#cccccc' font-size='13' font-family='Georgia, serif'>Sección 7.2  ·  Tipología mínima de comportamiento acumulativo en cadenas SV(9,3)</text>

<!-- THREE REGIME COLUMNS -->

<!-- === RÉGIMEN FINITO === -->
<rect x='16' y='68' width='358' height='460' rx='7' fill='#eef5fc' stroke='#2d6a9f' stroke-width='2'/>
<rect x='16' y='68' width='358' height='48' rx='7' fill='#2d6a9f'/>
<text x='195' y='90' text-anchor='middle' fill='#ffffff' font-size='16' font-weight='bold' font-family='Georgia, serif'>RÉGIMEN FINITO</text>
<text x='195' y='108' text-anchor='middle' fill='#cce0f5' font-size='12' font-family='Georgia, serif'>Cadena corta · acotada por diseño</text>

<text x='40' y='138' text-anchor='start' fill='#1a3a5c' font-size='13' font-weight='bold' font-family='Georgia, serif'>Características:</text>
<text x='40' y='160' text-anchor='start' fill='#333333' font-size='12' font-family='Georgia, serif'>· Número de pasos n predeterminado</text>
<text x='40' y='180' text-anchor='start' fill='#333333' font-size='12' font-family='Georgia, serif'>· Solo se requiere sentido local de A</text>
<text x='40' y='200' text-anchor='start' fill='#333333' font-size='12' font-family='Georgia, serif'>· No se plantea cuestión de límite</text>
<text x='40' y='220' text-anchor='start' fill='#333333' font-size='12' font-family='Georgia, serif'>· Adecuado para SV(9,3) básico</text>

<line x1='30' y1='232' x2='360' y2='232' stroke='#aacce8' stroke-width='1'/>
<text x='40' y='252' text-anchor='start' fill='#1a3a5c' font-size='13' font-weight='bold' font-family='Georgia, serif'>Ejemplo SV(9,3):</text>
<rect x='30' y='262' width='328' height='78' rx='4' fill='#ffffff' stroke='#aacce8' stroke-width='1'/>
<text x='194' y='282' text-anchor='middle' fill='#333333' font-size='11' font-family='Courier New, monospace'>e₁: P3 U→0  →  A₁ = 1</text>
<text x='194' y='302' text-anchor='middle' fill='#333333' font-size='11' font-family='Courier New, monospace'>e₂: P7 U→1  →  A₂ = 1.8</text>
<text x='194' y='322' text-anchor='middle' fill='#333333' font-size='11' font-family='Courier New, monospace'>e₃: P7 adj  →  A₃ = 2.3</text>
<text x='194' y='338' text-anchor='middle' fill='#555555' font-size='10' font-family='Georgia, serif'>Fin de cadena. No se pregunta por n→∞.</text>

<line x1='30' y1='352' x2='360' y2='352' stroke='#aacce8' stroke-width='1'/>
<text x='40' y='372' text-anchor='start' fill='#1a3a5c' font-size='12' font-weight='bold' font-family='Georgia, serif'>Estabilidad:</text>
<text x='40' y='392' text-anchor='start' fill='#555555' font-size='12' font-family='Georgia, serif'>No exigida globalmente.</text>
<text x='40' y='412' text-anchor='start' fill='#555555' font-size='12' font-family='Georgia, serif'>Φ solo necesita ser válida</text>
<text x='40' y='432' text-anchor='start' fill='#555555' font-size='12' font-family='Georgia, serif'>en los n pasos previstos.</text>

<rect x='30' y='454' width='328' height='34' rx='4' fill='#2d6a9f'/>
<text x='194' y='476' text-anchor='middle' fill='#ffffff' font-size='12' font-weight='bold' font-family='Georgia, serif'>A(e) definida · local · sin cuestión asintótica</text>

<!-- === RÉGIMEN ESTABLE === -->
<rect x='421' y='68' width='358' height='460' rx='7' fill='#eef5fc' stroke='#27a03a' stroke-width='2.5'/>
<rect x='421' y='68' width='358' height='48' rx='7' fill='#27a03a'/>
<text x='600' y='90' text-anchor='middle' fill='#ffffff' font-size='16' font-weight='bold' font-family='Georgia, serif'>RÉGIMEN ESTABLE</text>
<text x='600' y='108' text-anchor='middle' fill='#d4f0da' font-size='12' font-family='Georgia, serif'>Criterio de lectura persistente</text>

<text x='445' y='138' text-anchor='start' fill='#1a3a5c' font-size='13' font-weight='bold' font-family='Georgia, serif'>Características:</text>
<text x='445' y='160' text-anchor='start' fill='#333333' font-size='12' font-family='Georgia, serif'>· Cadena puede prolongarse</text>
<text x='445' y='180' text-anchor='start' fill='#333333' font-size='12' font-family='Georgia, serif'>· Φ permanece bien tipada en cada paso</text>
<text x='445' y='200' text-anchor='start' fill='#333333' font-size='12' font-family='Georgia, serif'>· Horizonte no se altera ilegítimamente</text>
<text x='445' y='220' text-anchor='start' fill='#333333' font-size='12' font-family='Georgia, serif'>· No implica convergencia numérica clásica</text>

<line x1='435' y1='232' x2='765' y2='232' stroke='#a0d8b0' stroke-width='1'/>
<text x='445' y='252' text-anchor='start' fill='#1a3a5c' font-size='13' font-weight='bold' font-family='Georgia, serif'>Ejemplo SV(9,3):</text>
<rect x='435' y='262' width='328' height='78' rx='4' fill='#ffffff' stroke='#a0d8b0' stroke-width='1'/>
<text x='599' y='282' text-anchor='middle' fill='#333333' font-size='11' font-family='Courier New, monospace'>e₁…e₄: P3,P7,P7,P2 locales</text>
<text x='599' y='302' text-anchor='middle' fill='#333333' font-size='11' font-family='Courier New, monospace'>misma familia de observables</text>
<text x='599' y='322' text-anchor='middle' fill='#333333' font-size='11' font-family='Courier New, monospace'>mismo horizonte declarado H</text>
<text x='599' y='338' text-anchor='middle' fill='#27a03a' font-size='10' font-weight='bold' font-family='Georgia, serif'>Φ legible en todos los pasos</text>

<line x1='435' y1='352' x2='765' y2='352' stroke='#a0d8b0' stroke-width='1'/>

<!-- Graph-like illustration of stable accumulation -->
<text x='445' y='372' text-anchor='start' fill='#1a3a5c' font-size='12' font-weight='bold' font-family='Georgia, serif'>Evolución de Aₙ:</text>
<polyline points='445,432 490,420 535,408 580,400 625,394 670,390 715,388 760,387' stroke='#27a03a' stroke-width='2.5' fill='none'/>
<line x1='445' y1='440' x2='765' y2='440' stroke='#888888' stroke-width='0.8'/>
<line x1='445' y1='378' x2='445' y2='440' stroke='#888888' stroke-width='0.8'/>
<text x='450' y='453' text-anchor='start' fill='#888888' font-size='9' font-family='Georgia, serif'>n=1</text>
<text x='750' y='453' text-anchor='start' fill='#888888' font-size='9' font-family='Georgia, serif'>n→</text>

<rect x='435' y='454' width='328' height='34' rx='4' fill='#27a03a'/>
<text x='599' y='474' text-anchor='middle' fill='#ffffff' font-size='12' font-weight='bold' font-family='Georgia, serif'>Lectura legible · sin ruptura · Φ persistente</text>

<!-- === RÉGIMEN SINGULAR === -->
<rect x='826' y='68' width='358' height='460' rx='7' fill='#eef5fc' stroke='#c0392b' stroke-width='2.5'/>
<rect x='826' y='68' width='358' height='48' rx='7' fill='#c0392b'/>
<text x='1005' y='90' text-anchor='middle' fill='#ffffff' font-size='16' font-weight='bold' font-family='Georgia, serif'>RÉGIMEN SINGULAR</text>
<text x='1005' y='108' text-anchor='middle' fill='#fddbd9' font-size='12' font-family='Georgia, serif'>Ruptura de lectura o cambio de horizonte</text>

<text x='850' y='138' text-anchor='start' fill='#1a3a5c' font-size='13' font-weight='bold' font-family='Georgia, serif'>Características:</text>
<text x='850' y='160' text-anchor='start' fill='#333333' font-size='12' font-family='Georgia, serif'>· Pérdida de transporte de observables</text>
<text x='850' y='180' text-anchor='start' fill='#333333' font-size='12' font-family='Georgia, serif'>· Cambio de horizonte no absorbible</text>
<text x='850' y='200' text-anchor='start' fill='#333333' font-size='12' font-family='Georgia, serif'>· Φ pierde tipado en algún paso</text>
<text x='850' y='220' text-anchor='start' fill='#333333' font-size='12' font-family='Georgia, serif'>· Cadena previa no se invalida</text>

<line x1='840' y1='232' x2='1170' y2='232' stroke='#f0b0a8' stroke-width='1'/>
<text x='850' y='252' text-anchor='start' fill='#1a3a5c' font-size='13' font-weight='bold' font-family='Georgia, serif'>Ejemplo SV(9,3):</text>
<rect x='840' y='262' width='328' height='78' rx='4' fill='#ffffff' stroke='#f0b0a8' stroke-width='1'/>
<text x='1004' y='282' text-anchor='middle' fill='#333333' font-size='11' font-family='Courier New, monospace'>e₁,e₂,e₃: régimen estable</text>
<text x='1004' y='302' text-anchor='middle' fill='#c0392b' font-size='11' font-family='Courier New, monospace'>e₄: cambio de horizonte H′≠H</text>
<text x='1004' y='322' text-anchor='middle' fill='#c0392b' font-size='11' font-family='Courier New, monospace'>nueva familia de observables</text>
<text x='1004' y='338' text-anchor='middle' fill='#c0392b' font-size='10' font-weight='bold' font-family='Georgia, serif'>Φ ilegible bajo la regla anterior</text>

<line x1='840' y1='352' x2='1170' y2='352' stroke='#f0b0a8' stroke-width='1'/>
<text x='850' y='372' text-anchor='start' fill='#1a3a5c' font-size='12' font-weight='bold' font-family='Georgia, serif'>Evolución de Aₙ:</text>
<polyline points='840,430 885,418 930,408 975,400' stroke='#27a03a' stroke-width='2' fill='none'/>
<polyline points='975,400 1020,395 1065,390 1110,386 1155,382' stroke='#27a03a' stroke-width='1' fill='none' stroke-dasharray='4,3' opacity='0.4'/>
<circle cx='975' cy='400' r='5' fill='#c0392b'/>
<text x='980' y='396' text-anchor='start' fill='#c0392b' font-size='10' font-family='Georgia, serif'>e₄ ⚠ H→H′</text>
<line x1='975' y1='400' x2='975' y2='438' stroke='#c0392b' stroke-width='1.5' stroke-dasharray='4,3'/>
<line x1='840' y1='440' x2='1170' y2='440' stroke='#888888' stroke-width='0.8'/>
<line x1='840' y1='378' x2='840' y2='440' stroke='#888888' stroke-width='0.8'/>
<text x='845' y='453' text-anchor='start' fill='#888888' font-size='9' font-family='Georgia, serif'>n=1</text>
<text x='1150' y='453' text-anchor='start' fill='#888888' font-size='9' font-family='Georgia, serif'>n→</text>

<rect x='840' y='454' width='328' height='34' rx='4' fill='#c0392b'/>
<text x='1004' y='474' text-anchor='middle' fill='#ffffff' font-size='12' font-weight='bold' font-family='Georgia, serif'>Acumulación ilegítima bajo la misma regla</text>

<!-- Bottom: Prop 3 & 4 -->
<rect x='16' y='542' width='1168' height='52' rx='5' fill='#1a3a5c'/>
<text x='600' y='562' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='bold' font-family='Georgia, serif'>Proposición 3 — Régimen estable ≠ convergencia clásica</text>
<text x='600' y='584' text-anchor='middle' fill='#cccccc' font-size='13' font-family='Georgia, serif'>Estabilidad = persistencia del criterio de lectura · No implica límite numérico cerrado</text>

<rect x='16' y='606' width='1168' height='52' rx='5' fill='#eef5fc' stroke='#2d6a9f' stroke-width='1.5'/>
<text x='600' y='626' text-anchor='middle' fill='#111111' font-size='14' font-weight='bold' font-family='Georgia, serif'>Proposición 4 — La acumulación eventiva es dependiente del régimen</text>
<text x='600' y='648' text-anchor='middle' fill='#333333' font-size='13' font-family='Georgia, serif'>El mismo esquema Φ puede ser legítimo en régimen finito/estable y dejar de serlo en régimen singular</text>

<!-- Adversarial 7.5 -->
<rect x='16' y='670' width='1168' height='52' rx='5' fill='#eef5fc' stroke='#2d6a9f' stroke-width='1.5'/>
<text x='600' y='690' text-anchor='middle' fill='#1a3a5c' font-size='13' font-weight='bold' font-family='Georgia, serif'>Adversarial A3 respondida — "Estable" no reintroduce cronología fuerte</text>
<text x='600' y='710' text-anchor='middle' fill='#333333' font-size='12' font-family='Georgia, serif'>"Estable" = régimen de lectura persistente  ·  No es una afirmación sobre el transcurso temporal</text>

