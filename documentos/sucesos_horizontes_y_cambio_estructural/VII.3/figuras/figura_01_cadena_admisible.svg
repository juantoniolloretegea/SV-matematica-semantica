<text x='90' y='116' text-anchor='middle' fill='#ffffff' font-size='13' font-family='Courier New, monospace'>x⁽⁰⁾=(0,0,U,0,0,0,U,0,0)</text>

<!-- Arrow from vector to e1 -->
<line x1='164' y1='110' x2='196' y2='110' stroke='#2d6a9f' stroke-width='2' marker-end='url(#arr)'/>

