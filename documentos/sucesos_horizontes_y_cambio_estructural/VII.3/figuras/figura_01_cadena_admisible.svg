<text x='285' y='100' text-anchor='middle' fill='#111111' font-size='17' font-weight='bold' font-family='Georgia, serif'>e₁</text>
<line x1='208' y1='108' x2='362' y2='108' stroke='#aacce8' stroke-width='1'/>
<text x='210' y='128' text-anchor='start' fill='#555555' font-size='12' font-family='Georgia, serif'>P3: U → 0</text>
<text x='210' y='148' text-anchor='start' fill='#555555' font-size='12' font-family='Georgia, serif'>σ(e₁) = {P3}</text>
<text x='210' y='168' text-anchor='start' fill='#555555' font-size='12' font-family='Georgia, serif'>H₁ declarado</text>
<rect x='208' y='178' width='154' height='22' rx='3' fill='#2d6a9f'/>
<text x='285' y='193' text-anchor='middle' fill='#ffffff' font-size='11' font-family='Courier New, monospace'>(0,0,0,0,0,0,U,0,0)</text>

<!-- Criteria C1 between e1-e2 -->
<rect x='378' y='62' width='116' height='162' rx='5' fill='#fffbe6' stroke='#c8a800' stroke-width='1.5'/>
<text x='436' y='84' text-anchor='middle' fill='#7a5900' font-size='11' font-weight='bold' font-family='Georgia, serif'>C1 · C2</text>
<line x1='384' y1='90' x2='488' y2='90' stroke='#e0c84a' stroke-width='1'/>
<text x='436' y='108' text-anchor='middle' fill='#555555' font-size='10.5' font-family='Georgia, serif'>Composición</text>
<text x='436' y='122' text-anchor='middle' fill='#555555' font-size='10.5' font-family='Georgia, serif'>local definible</text>
<line x1='400' y1='132' x2='472' y2='132' stroke='#e0c84a' stroke-width='0.8'/>
<text x='436' y='150' text-anchor='middle' fill='#555555' font-size='10.5' font-family='Georgia, serif'>Horizonte H₁</text>
<text x='436' y='164' text-anchor='middle' fill='#555555' font-size='10.5' font-family='Georgia, serif'>compatible</text>
<text x='436' y='178' text-anchor='middle' fill='#555555' font-size='10.5' font-family='Georgia, serif'>con H₂</text>
<text x='436' y='198' text-anchor='middle' fill='#27a03a' font-size='14' font-weight='bold' font-family='Georgia, serif'>✓</text>

<!-- e2 -->
<rect x='500' y='76' width='170' height='134' rx='6' fill='#eef5fc' stroke='#2d6a9f' stroke-width='2'/>
<text x='585' y='100' text-anchor='middle' fill='#111111' font-size='17' font-weight='bold' font-family='Georgia, serif'>e₂</text>
<line x1='508' y1='108' x2='662' y2='108' stroke='#aacce8' stroke-width='1'/>
<text x='510' y='128' text-anchor='start' fill='#555555' font-size='12' font-family='Georgia, serif'>P7: U → 1</text>
<text x='510' y='148' text-anchor='start' fill='#555555' font-size='12' font-family='Georgia, serif'>σ(e₂) = {P7}</text>
<text x='510' y='168' text-anchor='start' fill='#555555' font-size='12' font-family='Georgia, serif'>H₂ = H₁</text>
<rect x='508' y='178' width='154' height='22' rx='3' fill='#2d6a9f'/>
<text x='585' y='193' text-anchor='middle' fill='#ffffff' font-size='11' font-family='Courier New, monospace'>(0,0,0,0,0,0,1,0,0)</text>

<!-- Criteria C3 between e2-e3 -->
<rect x='676' y='62' width='116' height='162' rx='5' fill='#fffbe6' stroke='#c8a800' stroke-width='1.5'/>
<text x='734' y='84' text-anchor='middle' fill='#7a5900' font-size='11' font-weight='bold' font-family='Georgia, serif'>C3 · C4</text>
<line x1='682' y1='90' x2='786' y2='90' stroke='#e0c84a' stroke-width='1'/>
<text x='734' y='108' text-anchor='middle' fill='#555555' font-size='10.5' font-family='Georgia, serif'>Transporte</text>
<text x='734' y='122' text-anchor='middle' fill='#555555' font-size='10.5' font-family='Georgia, serif'>suficiente de</text>
<text x='734' y='136' text-anchor='middle' fill='#555555' font-size='10.5' font-family='Georgia, serif'>observables</text>
<line x1='690' y1='148' x2='778' y2='148' stroke='#e0c84a' stroke-width='0.8'/>
<text x='734' y='166' text-anchor='middle' fill='#555555' font-size='10.5' font-family='Georgia, serif'>Criterio de</text>
<text x='734' y='180' text-anchor='middle' fill='#555555' font-size='10.5' font-family='Georgia, serif'>lectura</text>
<text x='734' y='194' text-anchor='middle' fill='#555555' font-size='10.5' font-family='Georgia, serif'>acumulativa</text>
<text x='734' y='212' text-anchor='middle' fill='#27a03a' font-size='14' font-weight='bold' font-family='Georgia, serif'>✓</text>

<!-- e3 -->
<rect x='798' y='76' width='170' height='134' rx='6' fill='#eef5fc' stroke='#2d6a9f' stroke-width='2'/>
<text x='883' y='100' text-anchor='middle' fill='#111111' font-size='17' font-weight='bold' font-family='Georgia, serif'>e₃</text>
<line x1='806' y1='108' x2='960' y2='108' stroke='#aacce8' stroke-width='1'/>
<text x='808' y='128' text-anchor='start' fill='#555555' font-size='12' font-family='Georgia, serif'>P7: ajuste local</text>
<text x='808' y='148' text-anchor='start' fill='#555555' font-size='12' font-family='Georgia, serif'>σ(e₃) = {P7}</text>
<text x='808' y='168' text-anchor='start' fill='#555555' font-size='12' font-family='Georgia, serif'>H₃ = H₂ = H₁</text>
<rect x='806' y='178' width='154' height='22' rx='3' fill='#2d6a9f'/>
<text x='883' y='193' text-anchor='middle' fill='#ffffff' font-size='11' font-family='Courier New, monospace'>(0,0,0,0,0,0,1,0,0)</text>

<!-- Result label -->
<rect x='976' y='80' width='208' height='126' rx='5' fill='#1a3a5c'/>
<text x='1080' y='102' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='bold' font-family='Georgia, serif'>CADENA LEGÍTIMA</text>
<line x1='990' y1='110' x2='1170' y2='110' stroke='#4a9fd4' stroke-width='1'/>
<text x='1080' y='130' text-anchor='middle' fill='#aacce8' font-size='12' font-family='Georgia, serif'>e = (e₁, e₂, e₃)</text>
<text x='1080' y='150' text-anchor='middle' fill='#cccccc' font-size='11' font-family='Georgia, serif'>C1–C4 satisfechos</text>
<text x='1080' y='168' text-anchor='middle' fill='#cccccc' font-size='11' font-family='Georgia, serif'>Horizonte persistente</text>
<text x='1080' y='188' text-anchor='middle' fill='#7ed6a8' font-size='20' font-family='Georgia, serif'>✓</text>

<!-- Horizontal flow arrows -->
<line x1='370' y1='143' x2='500' y2='143' stroke='#2d6a9f' stroke-width='2' marker-end='url(#arr)'/>
