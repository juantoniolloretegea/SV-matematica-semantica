<text x='600' y='50' text-anchor='middle' fill='#cccccc' font-size='13' font-family='Georgia, serif'>Definición 5.1  ·  Cuatro condiciones simultáneas sobre pares consecutivos (eᵢ, eᵢ₊₁)</text>

<!-- Initial vector label -->
