<!-- LOWER SECTION: Rotura de cadena -->
<text x='600' y='260' text-anchor='middle' fill='#1a3a5c' font-size='15' font-weight='bold' font-family='Georgia, serif'>Contraejemplo: ruptura por observable ajena no transportable</text>

<!-- e1' -->
<rect x='60' y='272' width='150' height='100' rx='5' fill='#eef5fc' stroke='#2d6a9f' stroke-width='1.5'/>
<text x='135' y='294' text-anchor='middle' fill='#111111' font-size='15' font-weight='bold' font-family='Georgia, serif'>e₁</text>
<text x='70' y='316' text-anchor='start' fill='#555555' font-size='12' font-family='Georgia, serif'>P3: U → 0</text>
<text x='70' y='336' text-anchor='start' fill='#555555' font-size='12' font-family='Georgia, serif'>σ = {P3}, H₁</text>
<rect x='68' y='350' width='134' height='16' rx='2' fill='#2d6a9f'/>
<text x='135' y='362' text-anchor='middle' fill='#ffffff' font-size='10' font-family='Courier New, monospace'>x = (0,0,0,…)</text>

<!-- e2' -->
<rect x='300' y='272' width='150' height='100' rx='5' fill='#eef5fc' stroke='#2d6a9f' stroke-width='1.5'/>
<text x='375' y='294' text-anchor='middle' fill='#111111' font-size='15' font-weight='bold' font-family='Georgia, serif'>e₂</text>
<text x='310' y='316' text-anchor='start' fill='#555555' font-size='12' font-family='Georgia, serif'>P7: U → 1</text>
<text x='310' y='336' text-anchor='start' fill='#555555' font-size='12' font-family='Georgia, serif'>σ = {P7}, H₁</text>
<rect x='308' y='350' width='134' height='16' rx='2' fill='#2d6a9f'/>
<text x='375' y='362' text-anchor='middle' fill='#ffffff' font-size='10' font-family='Courier New, monospace'>x = (0,0,0,…,1,…)</text>

<!-- Break symbol -->
<rect x='540' y='282' width='120' height='80' rx='5' fill='#fdecea' stroke='#c0392b' stroke-width='2'/>
<text x='600' y='308' text-anchor='middle' fill='#c0392b' font-size='28' font-weight='bold' font-family='Georgia, serif'>✗</text>
<text x='600' y='332' text-anchor='middle' fill='#c0392b' font-size='11' font-family='Georgia, serif'>C3 incumplido</text>
<text x='600' y='348' text-anchor='middle' fill='#c0392b' font-size='11' font-family='Georgia, serif'>Obs. ajena</text>

<!-- e3' broken -->
<rect x='750' y='272' width='150' height='100' rx='5' fill='#fdecea' stroke='#c0392b' stroke-width='1.5'/>
<text x='825' y='294' text-anchor='middle' fill='#c0392b' font-size='15' font-weight='bold' font-family='Georgia, serif'>e₃ ⚠</text>
<text x='760' y='316' text-anchor='start' fill='#888888' font-size='12' font-family='Georgia, serif'>Observable O*</text>
<text x='760' y='336' text-anchor='start' fill='#888888' font-size='12' font-family='Georgia, serif'>ajena al régimen</text>
<rect x='758' y='350' width='134' height='16' rx='2' fill='#c0392b'/>
<text x='825' y='362' text-anchor='middle' fill='#ffffff' font-size='10' font-family='Courier New, monospace'>H₃ ≠ H₁,H₂</text>

<text x='1000' y='318' text-anchor='middle' fill='#c0392b' font-size='13' font-weight='bold' font-family='Georgia, serif'>No cadena:</text>
<text x='1000' y='338' text-anchor='middle' fill='#c0392b' font-size='12' font-family='Georgia, serif'>sucesión arbitraria</text>
<text x='1000' y='358' text-anchor='middle' fill='#888888' font-size='11' font-family='Georgia, serif'>de incidencias</text>

<line x1='210' y1='322' x2='300' y2='322' stroke='#2d6a9f' stroke-width='1.5' marker-end='url(#arr)'/>
<line x1='450' y1='322' x2='540' y2='322' stroke='#c0392b' stroke-width='1.5'/>
<line x1='540' y1='322' x2='660' y2='322' stroke='#c0392b' stroke-width='1.5' stroke-dasharray='5,4' marker-end='url(#arrbad)'/>
<line x1='660' y1='322' x2='750' y2='322' stroke='#c0392b' stroke-width='1.5' stroke-dasharray='5,4'/>

<!-- 4 criteria summary panel -->
<rect x='16' y='390' width='1168' height='100' rx='5' fill='#eef5fc' stroke='#2d6a9f' stroke-width='1.5'/>
<text x='600' y='412' text-anchor='middle' fill='#1a3a5c' font-size='14' font-weight='bold' font-family='Georgia, serif'>Los cuatro criterios de cadena (Def. 5.1)</text>
<text x='148' y='440' text-anchor='middle' fill='#2d6a9f' font-size='13' font-weight='bold' font-family='Georgia, serif'>C1</text>
<text x='148' y='458' text-anchor='middle' fill='#333333' font-size='12' font-family='Georgia, serif'>Composición local</text>
<text x='148' y='474' text-anchor='middle' fill='#333333' font-size='12' font-family='Georgia, serif'>eᵢ₊₁ ∘ eᵢ definible</text>
<text x='440' y='440' text-anchor='middle' fill='#2d6a9f' font-size='13' font-weight='bold' font-family='Georgia, serif'>C2</text>
<text x='440' y='458' text-anchor='middle' fill='#333333' font-size='12' font-family='Georgia, serif'>Horizontes compatibles</text>
<text x='440' y='474' text-anchor='middle' fill='#333333' font-size='12' font-family='Georgia, serif'>H(eᵢ) → H(eᵢ₊₁)</text>
<text x='760' y='440' text-anchor='middle' fill='#2d6a9f' font-size='13' font-weight='bold' font-family='Georgia, serif'>C3</text>
<text x='760' y='458' text-anchor='middle' fill='#333333' font-size='12' font-family='Georgia, serif'>Transporte suficiente</text>
<text x='760' y='474' text-anchor='middle' fill='#333333' font-size='12' font-family='Georgia, serif'>de observables</text>
<text x='1052' y='440' text-anchor='middle' fill='#2d6a9f' font-size='13' font-weight='bold' font-family='Georgia, serif'>C4</text>
<text x='1052' y='458' text-anchor='middle' fill='#333333' font-size='12' font-family='Georgia, serif'>Criterio acumulativo</text>
<text x='1052' y='474' text-anchor='middle' fill='#333333' font-size='12' font-family='Georgia, serif'>explícito y persistente</text>
<line x1='290' y1='420' x2='290' y2='482' stroke='#aacce8' stroke-width='1'/>
<line x1='598' y1='420' x2='598' y2='482' stroke='#aacce8' stroke-width='1'/>
<line x1='908' y1='420' x2='908' y2='482' stroke='#aacce8' stroke-width='1'/>

<!-- Proposition box -->
<rect x='16' y='502' width='1168' height='64' rx='5' fill='#1a3a5c' stroke='#1a3a5c' stroke-width='1.5'/>
<text x='600' y='524' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='bold' font-family='Georgia, serif'>Proposición 1 — No toda sucesión de sucesos admisibles es una cadena legítima</text>
<text x='600' y='550' text-anchor='middle' fill='#cccccc' font-size='13' font-family='Georgia, serif'>Puede faltar composibilidad local, compatibilidad de horizonte o criterio común de lectura acumulativa</text>

<!-- Obs. 5.2 box -->
<rect x='16' y='578' width='1168' height='52' rx='5' fill='#eef5fc' stroke='#2d6a9f' stroke-width='1.5'/>
<text x='600' y='598' text-anchor='middle' fill='#111111' font-size='14' font-weight='bold' font-family='Georgia, serif'>Obs. 5.2 — Mera composibilidad local ≠ cadena</text>
<text x='600' y='620' text-anchor='middle' fill='#333333' font-size='13' font-family='Georgia, serif'>Una iteración local puede existir sin criterio acumulativo, sin compatibilidad de horizonte ni transporte de observables</text>

<!-- Obs. 3.3 / SV(9,3) anchor -->
<rect x='16' y='642' width='1168' height='52' rx='5' fill='#eef5fc' stroke='#2d6a9f' stroke-width='1.5'/>
<text x='600' y='662' text-anchor='middle' fill='#111111' font-size='14' font-weight='bold' font-family='Georgia, serif'>Célula SV(9,3): nueve posiciones, tres grupos estructurales de lectura</text>
<text x='600' y='684' text-anchor='middle' fill='#333333' font-size='13' font-family='Georgia, serif'>Espacio ternario Σ = {0, 1, U}  ·  σ(eᵢ) ⊆ {P1,…,P9}  ·  Horizonte H declarado en cada suceso</text>

