<svg viewBox='0 0 1200 800' width='1200' height='800' xmlns='http://www.w3.org/2000/svg' style='max-width:100%;display:block;background:#ffffff;'>
<rect width='1200' height='800' fill='#ffffff' stroke='#2d6a9f' stroke-width='2'/>
<rect x='0' y='0' width='1200' height='56' fill='#1a3a5c'/>
<text x='600' y='30' text-anchor='middle' fill='#ffffff' font-size='19' font-weight='bold' font-family='Georgia, serif'>Figura 1. Respuesta estructural a suceso de horizonte</text>
<text x='600' y='50' text-anchor='middle' fill='#cccccc' font-size='13' font-family='Georgia, serif'>VII.4 · Partición mínima entre persistencia legítima, reevaluación y no herencia</text>

<rect x='28' y='84' width='214' height='122' rx='6' fill='#1a3a5c'/>
<text x='135' y='110' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='bold' font-family='Georgia, serif'>Célula SV(9,3) · régimen R</text>
<line x1='42' y1='118' x2='228' y2='118' stroke='#4a9fd4' stroke-width='1'/>
<text x='135' y='140' text-anchor='middle' fill='#cccccc' font-size='12' font-family='Georgia, serif'>x = (0, U, 0, 0, 1, 0, U, 0, 0)</text>
<text x='135' y='160' text-anchor='middle' fill='#cccccc' font-size='12' font-family='Georgia, serif'>observables O = {P2, P5, P7}</text>
<text x='135' y='182' text-anchor='middle' fill='#7ed6a8' font-size='12' font-family='Georgia, serif'>legibilidad disponible</text>

<line x1='242' y1='145' x2='318' y2='145' stroke='#2d6a9f' stroke-width='2' marker-end='url(#arr)'/>
<rect x='318' y='96' width='220' height='98' rx='6' fill='#fffbe6' stroke='#c8a800' stroke-width='2'/>
<text x='428' y='120' text-anchor='middle' fill='#7a5900' font-size='15' font-weight='bold' font-family='Georgia, serif'>Suceso admisible e en horizonte H</text>
<line x1='332' y1='128' x2='524' y2='128' stroke='#e0c84a' stroke-width='1'/>
<text x='428' y='149' text-anchor='middle' fill='#555555' font-size='12' font-family='Georgia, serif'>no es mero “después” cronológico</text>
<text x='428' y='168' text-anchor='middle' fill='#555555' font-size='12' font-family='Georgia, serif'>obliga a declarar respuesta estructural</text>

<line x1='538' y1='145' x2='622' y2='145' stroke='#2d6a9f' stroke-width='2' marker-end='url(#arr)'/>
<rect x='622' y='86' width='550' height='118' rx='6' fill='#eef5fc' stroke='#2d6a9f' stroke-width='2'/>
<text x='897' y='112' text-anchor='middle' fill='#1a3a5c' font-size='16' font-weight='bold' font-family='Georgia, serif'>Respuesta estructural tipada</text>
<line x1='640' y1='120' x2='1154' y2='120' stroke='#aacce8' stroke-width='1'/>
<text x='897' y='145' text-anchor='middle' fill='#555555' font-size='13' font-family='Georgia, serif'>Debe decidir qué persiste, qué exige reevaluación y qué no puede heredarse</text>
<text x='897' y='168' text-anchor='middle' fill='#555555' font-size='13' font-family='Georgia, serif'>sin confundir cambio estructural con simple continuidad verbal</text>
<text x='897' y='190' text-anchor='middle' fill='#2d6a9f' font-size='12' font-family='Georgia, serif'>R → respuesta(R,e,H)</text>

<line x1='28' y1='232' x2='1172' y2='232' stroke='#2d6a9f' stroke-width='1' stroke-dasharray='6,4'/>
<text x='600' y='262' text-anchor='middle' fill='#1a3a5c' font-size='15' font-weight='bold' font-family='Georgia, serif'>Las tres zonas obligatorias de la respuesta</text>

<rect x='46' y='292' width='320' height='220' rx='6' fill='#e9f8ee' stroke='#27a03a' stroke-width='2'/>
<text x='206' y='320' text-anchor='middle' fill='#1d6e2c' font-size='18' font-weight='bold' font-family='Georgia, serif'>Zona persistente</text>
<line x1='62' y1='328' x2='350' y2='328' stroke='#8dd3a0' stroke-width='1'/>
<text x='74' y='356' text-anchor='start' fill='#333333' font-size='13' font-family='Georgia, serif'>• Conserva observables aún transportables</text>
<text x='74' y='382' text-anchor='start' fill='#333333' font-size='13' font-family='Georgia, serif'>• Permite herencia legítima del régimen previo</text>
<text x='74' y='408' text-anchor='start' fill='#333333' font-size='13' font-family='Georgia, serif'>• Mantiene legibilidad estructural suficiente</text>
<rect x='74' y='436' width='264' height='48' rx='4' fill='#27a03a'/>
<text x='206' y='456' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='bold' font-family='Georgia, serif'>No exige reinicio</text>
<text x='206' y='474' text-anchor='middle' fill='#ffffff' font-size='12' font-family='Georgia, serif'>aunque sí puede exigir vigilancia</text>

<rect x='440' y='292' width='320' height='220' rx='6' fill='#fffbe6' stroke='#c8a800' stroke-width='2'/>
<text x='600' y='320' text-anchor='middle' fill='#7a5900' font-size='18' font-weight='bold' font-family='Georgia, serif'>Zona de reevaluación</text>
<line x1='456' y1='328' x2='744' y2='328' stroke='#e0c84a' stroke-width='1'/>
<text x='468' y='356' text-anchor='start' fill='#333333' font-size='13' font-family='Georgia, serif'>• Exige nueva lectura del soporte o del horizonte</text>
<text x='468' y='382' text-anchor='start' fill='#333333' font-size='13' font-family='Georgia, serif'>• Puede conservar parte del régimen anterior</text>
<text x='468' y='408' text-anchor='start' fill='#333333' font-size='13' font-family='Georgia, serif'>• Debe declarar criterios y observables relevantes</text>
<rect x='468' y='436' width='264' height='48' rx='4' fill='#c8a800'/>
<text x='600' y='456' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='bold' font-family='Georgia, serif'>No autoriza silencio narrativo</text>
<text x='600' y='474' text-anchor='middle' fill='#ffffff' font-size='12' font-family='Georgia, serif'>la reevaluación debe quedar tipada</text>

<rect x='834' y='292' width='320' height='220' rx='6' fill='#fdecea' stroke='#c0392b' stroke-width='2'/>
<text x='994' y='320' text-anchor='middle' fill='#c0392b' font-size='18' font-weight='bold' font-family='Georgia, serif'>Zona no heredable</text>
<line x1='850' y1='328' x2='1138' y2='328' stroke='#ef9a93' stroke-width='1'/>
<text x='862' y='356' text-anchor='start' fill='#333333' font-size='13' font-family='Georgia, serif'>• El régimen previo ya no sostiene la lectura</text>
<text x='862' y='382' text-anchor='start' fill='#333333' font-size='13' font-family='Georgia, serif'>• Se prohíbe el arrastre automático de acumulación</text>
<text x='862' y='408' text-anchor='start' fill='#333333' font-size='13' font-family='Georgia, serif'>• Exige ruptura, transición o suspensión declarada</text>
<rect x='862' y='436' width='264' height='48' rx='4' fill='#c0392b'/>
<text x='994' y='456' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='bold' font-family='Georgia, serif'>No puede heredarse como hecho</text>
<text x='994' y='474' text-anchor='middle' fill='#ffffff' font-size='12' font-family='Georgia, serif'>sin nueva formalización explícita</text>

<rect x='46' y='548' width='1108' height='124' rx='6' fill='#eef5fc' stroke='#2d6a9f' stroke-width='1.5'/>
<text x='600' y='574' text-anchor='middle' fill='#1a3a5c' font-size='16' font-weight='bold' font-family='Georgia, serif'>Proposición doctrinal mínima</text>
<text x='600' y='604' text-anchor='middle' fill='#333333' font-size='13' font-family='Georgia, serif'>Todo suceso de horizonte obliga a una partición explícita entre persistencia, reevaluación y no herencia.</text>
<text x='600' y='628' text-anchor='middle' fill='#333333' font-size='13' font-family='Georgia, serif'>Sin esa partición, el sistema no ha respondido estructuralmente: sólo ha prolongado verbalmente el régimen previo.</text>
<text x='600' y='654' text-anchor='middle' fill='#2d6a9f' font-size='13' font-family='Georgia, serif'>Aplicación inmediata: disciplina de cadenas, control del umbral y apertura del carril de células especializadas.</text>

<rect x='0' y='774' width='1200' height='26' fill='#1a3a5c'/>
<text x='600' y='791' text-anchor='middle' fill='#ffffff' font-size='9' font-weight='bold' font-family='Georgia, serif'>Juan Antonio Lloret Egea | ORCID: 0000-0002-6634-3351 | Serie doctrinal: Sistema Vectorial SV | Madrid, 25 de marzo de 2026</text>
<defs><marker id='arr' markerWidth='12' markerHeight='12' refX='9' refY='5' orient='auto'><path d='M0,0 L0,10 L12,5 z' fill='#2d6a9f'/></marker></defs>
</svg>