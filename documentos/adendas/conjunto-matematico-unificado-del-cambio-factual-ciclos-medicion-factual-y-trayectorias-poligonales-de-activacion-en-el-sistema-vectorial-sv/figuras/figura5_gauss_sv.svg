<text x="720" y="66" text-anchor="middle" font-size="14" fill="#555">Ejemplo director Σ₃ (SV(3,9)): divergencia Div(Cₖ) = φ(Sₖ) − φ(Sₖ₊₁) = −mₖ en cada tramo</text>
