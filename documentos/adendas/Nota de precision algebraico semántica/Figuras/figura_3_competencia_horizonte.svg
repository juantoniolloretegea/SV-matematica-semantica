<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
<rect width="1200" height="800" fill="#fff"/>
<text x="600" y="60" text-anchor="middle" font-size="34" font-family="Arial" font-weight="700">Figura 3. Competencia de horizonte</text>
<rect x="380" y="120" width="440" height="70" rx="14" fill="#eef6ff" stroke="#1f4d7a" stroke-width="4"/>
<text x="600" y="163" text-anchor="middle" font-size="26" font-family="Arial" font-weight="700">¿Puede intervenir H+?</text>
<path d="M600 190 L600 250" stroke="#333" stroke-width="4" marker-end="url(#a)"/>
<rect x="300" y="250" width="600" height="70" rx="14" fill="#f7f7f7" stroke="#444" stroke-width="3"/>
<text x="600" y="293" text-anchor="middle" font-size="22" font-family="Arial">1. Relación arquitectónicamente declarada</text>
<path d="M600 320 L600 380" stroke="#333" stroke-width="4" marker-end="url(#a)"/>
<rect x="300" y="380" width="600" height="70" rx="14" fill="#f7f7f7" stroke="#444" stroke-width="3"/>
<text x="600" y="423" text-anchor="middle" font-size="22" font-family="Arial">2. Sucesos relevantes para la situación efectiva</text>
<path d="M600 450 L600 510" stroke="#333" stroke-width="4" marker-end="url(#a)"/>
<rect x="300" y="510" width="600" height="70" rx="14" fill="#f7f7f7" stroke="#444" stroke-width="3"/>
<text x="600" y="553" text-anchor="middle" font-size="22" font-family="Arial">3. La cuestión excede el plano local</text>
<path d="M600 580 L600 640" stroke="#333" stroke-width="4" marker-end="url(#a)"/>
<rect x="300" y="640" width="600" height="70" rx="14" fill="#fff3e8" stroke="#a35a00" stroke-width="3"/>
<text x="600" y="683" text-anchor="middle" font-size="22" font-family="Arial">4. No hay relevancia introducida ex post</text>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><polygon points="0 0,10 3,0 6" fill="#333"/></marker></defs>
</svg>