<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
<rect width="1200" height="800" fill="#fff"/>
<text x="600" y="60" text-anchor="middle" font-size="34" font-family="Arial" font-weight="700">Figura 4. Coexistencia de clausura local y situación efectiva</text>
<rect x="120" y="170" width="420" height="430" rx="18" fill="#eef6ff" stroke="#1f4d7a" stroke-width="4"/>
<text x="330" y="220" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700">Plano local</text>
<text x="330" y="300" text-anchor="middle" font-size="26" font-family="Arial">S1</text>
<text x="330" y="360" text-anchor="middle" font-size="22" font-family="Arial">clausura local</text>
<text x="330" y="430" text-anchor="middle" font-size="30" font-family="Arial" font-weight="700">{0, 1, U}</text>
<text x="330" y="520" text-anchor="middle" font-size="20" font-family="Arial">suficiente en su plano</text>

<rect x="660" y="170" width="420" height="430" rx="18" fill="#eff7ef" stroke="#20603d" stroke-width="4"/>
<text x="870" y="220" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700">Plano situacional</text>
<text x="870" y="300" text-anchor="middle" font-size="24" font-family="Arial">S1 + sucesos envolventes</text>
<text x="870" y="360" text-anchor="middle" font-size="22" font-family="Arial">reevaluación situacional</text>
<text x="870" y="430" text-anchor="middle" font-size="30" font-family="Arial" font-weight="700">{0, 1, U} / inadmisibilidad</text>
<text x="870" y="520" text-anchor="middle" font-size="20" font-family="Arial">competencia de horizonte</text>

<path d="M540 385 L660 385" stroke="#444" stroke-width="5" marker-end="url(#b)"/>
<text x="600" y="355" text-anchor="middle" font-size="18" font-family="Arial">no contradicción</text>
<defs><marker id="b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><polygon points="0 0,10 3,0 6" fill="#444"/></marker></defs>
</svg>