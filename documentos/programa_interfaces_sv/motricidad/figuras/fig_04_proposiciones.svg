<svg width="100%" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: sans-serif; }
    .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .ts { font-size: 12px; fill: #5F5E5A; }
    .purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 1.5; }
    .purple-th { font-size: 14px; font-weight: 500; fill: #3C3489; }
    .purple-ts { font-size: 12px; fill: #534AB7; }
    .blue { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
    .blue-th { font-size: 14px; font-weight: 500; fill: #0C447C; }
    .blue-ts { font-size: 12px; fill: #185FA5; }
    .amber { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
    .amber-th { font-size: 14px; font-weight: 500; fill: #633806; }
    .amber-ts { font-size: 12px; fill: #854F0B; }
    .coral { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
    .coral-th { font-size: 14px; font-weight: 500; fill: #712B13; }
    .coral-ts { font-size: 12px; fill: #993C1D; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="215" y="14" width="250" height="52" rx="8" class="purple"/>
  <text class="purple-th" x="340" y="34" text-anchor="middle" dominant-baseline="central">H no es trivial</text>
  <text class="purple-ts" x="340" y="54" text-anchor="middle" dominant-baseline="central">válido ≠ habilitable</text>

  <rect x="20" y="140" width="148" height="72" rx="8" class="blue"/>
  <text class="blue-th" x="94" y="162" text-anchor="middle" dominant-baseline="central">Prop. 1</text>
  <text class="blue-ts" x="94" y="182" text-anchor="middle" dominant-baseline="central">no trivialidad</text>
  <text class="blue-ts" x="94" y="200" text-anchor="middle" dominant-baseline="central">∃ válido ∧ ¬habilit.</text>
  <line x1="248" y1="60" x2="100" y2="140" stroke="#B4B2A9" stroke-width="0.8" fill="none" marker-end="url(#arr)"/>

  <rect x="188" y="140" width="148" height="72" rx="8" class="amber"/>
  <text class="amber-th" x="262" y="162" text-anchor="middle" dominant-baseline="central">Prop. 2</text>
  <text class="amber-ts" x="262" y="182" text-anchor="middle" dominant-baseline="central">sensibilidad a U</text>
  <text class="amber-ts" x="262" y="200" text-anchor="middle" dominant-baseline="central">U →* v ⟹ H = 0</text>
  <line x1="320" y1="66" x2="262" y2="140" stroke="#B4B2A9" stroke-width="0.8" fill="none" marker-end="url(#arr)"/>

  <rect x="356" y="140" width="148" height="72" rx="8" class="blue"/>
  <text class="blue-th" x="430" y="162" text-anchor="middle" dominant-baseline="central">Prop. 3</text>
  <text class="blue-ts" x="430" y="182" text-anchor="middle" dominant-baseline="central">dep. de clausura</text>
  <text class="blue-ts" x="430" y="200" text-anchor="middle" dominant-baseline="central">Anc(v) ⊄ N ⟹ H=0</text>
  <line x1="380" y1="62" x2="430" y2="140" stroke="#B4B2A9" stroke-width="0.8" fill="none" marker-end="url(#arr)"/>

  <rect x="524" y="140" width="148" height="72" rx="8" class="coral"/>
  <text class="coral-th" x="598" y="162" text-anchor="middle" dominant-baseline="central">Prop. 4</text>
  <text class="coral-ts" x="598" y="182" text-anchor="middle" dominant-baseline="central">no composicional</text>
  <text class="coral-ts" x="598" y="200" text-anchor="middle" dominant-baseline="central">H(T₁⊕T₂) ≠ H(T₁)…</text>
  <line x1="432" y1="60" x2="598" y2="140" stroke="#B4B2A9" stroke-width="0.8" fill="none" marker-end="url(#arr)"/>

  <line x1="40" y1="256" x2="640" y2="256" stroke="#D3D1C7" stroke-width="0.5"/>
  <text class="ts" x="340" y="272" text-anchor="middle">H opera sobre la semántica ternaria del SV · no amplía la ontología</text>
  <text class="ts" x="340" y="292" text-anchor="middle">demostradas formalmente en §7 del paper</text>
</svg>
