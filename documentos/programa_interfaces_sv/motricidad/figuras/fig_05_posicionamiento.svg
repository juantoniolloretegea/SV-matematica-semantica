<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: sans-serif; }
    .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .ts { font-size: 12px; fill: #5F5E5A; }
    .gray { fill: #F1EFE8; stroke: #888780; stroke-width: 0.5; }
    .gray-th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .gray-ts { font-size: 12px; fill: #5F5E5A; }
    .teal { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
    .teal-th { font-size: 14px; font-weight: 500; fill: #085041; }
    .teal-ts { font-size: 12px; fill: #0F6E56; }
    .purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 2; }
    .purple-th { font-size: 14px; font-weight: 500; fill: #3C3489; }
    .purple-ts { font-size: 12px; fill: #534AB7; }
    .axis { stroke: #D3D1C7; stroke-width: 0.5; stroke-dasharray: 5 4; }
  </style>
  <defs>
    <marker id="arrg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Axis labels — kept well away from boxes -->
  <text class="ts" x="340" y="16" text-anchor="middle">▲ modela ejecución / dinámica</text>
  <text class="ts" x="340" y="392" text-anchor="middle">▼ no modela ejecución</text>
  <!-- Left/right axis labels at y=200, clear of all boxes -->
  <text class="ts" x="10" y="204" text-anchor="start">◄ bivaluado</text>
  <text class="ts" x="670" y="204" text-anchor="end">ternario ►</text>

  <!-- Axis lines -->
  <line x1="340" y1="26" x2="340" y2="378" class="axis" fill="none"/>
  <line x1="30" y1="200" x2="650" y2="200" class="axis" fill="none"/>

  <!-- LEFT COLUMN: 4 gray boxes, evenly spaced vertically -->
  <!-- Redes de Petri: y=40 -->
  <rect x="36" y="40" width="158" height="50" rx="8" class="gray"/>
  <text class="gray-th" x="115" y="59" text-anchor="middle" dominant-baseline="central">Redes de Petri</text>
  <text class="gray-ts" x="115" y="77" text-anchor="middle" dominant-baseline="central">dinámica · consume recursos</text>

  <!-- TAMP: y=110 -->
  <rect x="46" y="110" width="138" height="50" rx="8" class="gray"/>
  <text class="gray-th" x="115" y="129" text-anchor="middle" dominant-baseline="central">TAMP</text>
  <text class="gray-ts" x="115" y="147" text-anchor="middle" dominant-baseline="central">planificación + mov.</text>

  <!-- Behavior Trees: y=218 -->
  <rect x="36" y="218" width="158" height="50" rx="8" class="gray"/>
  <text class="gray-th" x="115" y="237" text-anchor="middle" dominant-baseline="central">Behavior Trees</text>
  <text class="gray-ts" x="115" y="255" text-anchor="middle" dominant-baseline="central">ejecución reactiva</text>

  <!-- Precond. Hoare: y=300 -->
  <rect x="36" y="300" width="158" height="50" rx="8" class="gray"/>
  <text class="gray-th" x="115" y="319" text-anchor="middle" dominant-baseline="central">Precond. Hoare</text>
  <text class="gray-ts" x="115" y="337" text-anchor="middle" dominant-baseline="central">bivaluado · formal</text>

  <!-- RIGHT COLUMN -->
  <!-- Semántica SV: top right y=40 -->
  <rect x="490" y="40" width="158" height="50" rx="8" class="teal"/>
  <text class="teal-th" x="569" y="59" text-anchor="middle" dominant-baseline="central">Semántica SV</text>
  <text class="teal-ts" x="569" y="77" text-anchor="middle" dominant-baseline="central">captura · clausura</text>

  <!-- CSE: bottom right y=290 — well below axis -->
  <rect x="482" y="290" width="174" height="68" rx="8" class="purple"/>
  <text class="purple-th" x="569" y="312" text-anchor="middle" dominant-baseline="central">CSE · este trabajo</text>
  <text class="purple-ts" x="569" y="332" text-anchor="middle" dominant-baseline="central">ternario</text>
  <text class="purple-ts" x="569" y="348" text-anchor="middle" dominant-baseline="central">legitimidad de exposición</text>

  <!-- Arrow Semántica SV → CSE — with "extiende" label in the middle gap -->
  <line x1="569" y1="90" x2="569" y2="290" stroke="#1D9E75" stroke-width="1.2" fill="none" marker-end="url(#arrg)"/>
  <!-- "extiende" label: placed at midpoint x=590 (right of the arrow), y=190 — above axis label -->
  <text class="ts" x="590" y="190" dominant-baseline="central">extiende</text>

  <!-- Dashed line from CSE leftward -->
  <line x1="482" y1="320" x2="196" y2="258" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="5 3" fill="none"/>
  <text class="ts" x="335" y="310" text-anchor="middle">no ejecuta · no consume recursos</text>
</svg>
