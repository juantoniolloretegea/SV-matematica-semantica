<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: sans-serif; }
    .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .ts { font-size: 12px; fill: #5F5E5A; }
    .label-box { fill: #F1EFE8; stroke: #D3D1C7; stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arru" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- EJ1 — top left quadrant -->
  <rect x="20" y="10" width="290" height="50" rx="6" class="label-box"/>
  <text class="th" x="165" y="28" text-anchor="middle" dominant-baseline="central">Ejemplo 1</text>
  <text class="ts" x="165" y="48" text-anchor="middle" dominant-baseline="central">C4 falla · H(T₁) = 0</text>

  <circle cx="65" cy="125" r="30" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="65" y="117" text-anchor="middle" dominant-baseline="central">A</text>
  <text class="ts" x="65" y="136" text-anchor="middle" dominant-baseline="central">1</text>

  <circle cx="165" cy="125" r="30" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text class="th" x="165" y="117" text-anchor="middle" dominant-baseline="central">B</text>
  <text class="ts" x="165" y="136" text-anchor="middle" dominant-baseline="central">U</text>

  <circle cx="265" cy="125" r="30" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.5"/>
  <circle cx="265" cy="125" r="37" fill="none" stroke="#A32D2D" stroke-width="0.8"/>
  <text class="th" x="265" y="117" text-anchor="middle" dominant-baseline="central">C</text>
  <text class="ts" x="265" y="136" text-anchor="middle" dominant-baseline="central">1 · v</text>

  <line x1="95" y1="125" x2="133" y2="125" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <line x1="195" y1="125" x2="226" y2="125" stroke="#BA7517" stroke-width="2" fill="none" marker-end="url(#arru)"/>

  <!-- EJ2 — top right quadrant -->
  <rect x="370" y="10" width="290" height="50" rx="6" class="label-box"/>
  <text class="th" x="515" y="28" text-anchor="middle" dominant-baseline="central">Ejemplo 2</text>
  <text class="ts" x="515" y="48" text-anchor="middle" dominant-baseline="central">C4 indirecto · H(T₂) = 0</text>

  <circle cx="415" cy="125" r="30" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text class="th" x="415" y="117" text-anchor="middle" dominant-baseline="central">D</text>
  <text class="ts" x="415" y="136" text-anchor="middle" dominant-baseline="central">U</text>

  <circle cx="515" cy="125" r="30" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="515" y="117" text-anchor="middle" dominant-baseline="central">B</text>
  <text class="ts" x="515" y="136" text-anchor="middle" dominant-baseline="central">1</text>

  <circle cx="615" cy="125" r="30" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.5"/>
  <circle cx="615" cy="125" r="37" fill="none" stroke="#A32D2D" stroke-width="0.8"/>
  <text class="th" x="615" y="117" text-anchor="middle" dominant-baseline="central">C</text>
  <text class="ts" x="615" y="136" text-anchor="middle" dominant-baseline="central">1 · v</text>

  <line x1="445" y1="125" x2="483" y2="125" stroke="#BA7517" stroke-width="2" fill="none" marker-end="url(#arru)"/>
  <line x1="545" y1="125" x2="578" y2="125" stroke="#BA7517" stroke-width="2" fill="none" marker-end="url(#arru)"/>

  <!-- Horizontal divider -->
  <line x1="30" y1="205" x2="650" y2="205" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="6 4"/>

  <!-- EJ3 — bottom left quadrant -->
  <rect x="20" y="218" width="290" height="50" rx="6" class="label-box"/>
  <text class="th" x="165" y="236" text-anchor="middle" dominant-baseline="central">Ejemplo 3</text>
  <text class="ts" x="165" y="256" text-anchor="middle" dominant-baseline="central">C6 falla · H(T₃) = 0</text>

  <circle cx="165" cy="345" r="30" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.5"/>
  <circle cx="165" cy="345" r="37" fill="none" stroke="#A32D2D" stroke-width="0.8"/>
  <text class="th" x="165" y="337" text-anchor="middle" dominant-baseline="central">A</text>
  <text class="ts" x="165" y="356" text-anchor="middle" dominant-baseline="central">1 · v</text>
  <text class="ts" x="165" y="396" text-anchor="middle">R = ∅  (sin aristas)</text>

  <!-- EJ4 — bottom right quadrant -->
  <rect x="370" y="218" width="290" height="50" rx="6" class="label-box"/>
  <text class="th" x="515" y="236" text-anchor="middle" dominant-baseline="central">Ejemplo 4</text>
  <text class="ts" x="515" y="256" text-anchor="middle" dominant-baseline="central">C1–C6 satisfechas · H(T₄) = 1</text>

  <circle cx="430" cy="345" r="30" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="430" y="337" text-anchor="middle" dominant-baseline="central">A</text>
  <text class="ts" x="430" y="356" text-anchor="middle" dominant-baseline="central">1</text>

  <circle cx="600" cy="345" r="30" fill="#E1F5EE" stroke="#1D9E75" stroke-width="2"/>
  <circle cx="600" cy="345" r="37" fill="none" stroke="#1D9E75" stroke-width="1.2"/>
  <text class="th" x="600" y="337" text-anchor="middle" dominant-baseline="central">B</text>
  <text class="ts" x="600" y="356" text-anchor="middle" dominant-baseline="central">1 · v</text>

  <line x1="460" y1="345" x2="561" y2="345" stroke="#1D9E75" stroke-width="2" fill="none" marker-end="url(#arrg)"/>

  <!-- Leyenda — 4 items spread across full width with padding -->
  <rect x="60" y="438" width="560" height="46" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>

  <circle cx="100" cy="461" r="11" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text class="ts" x="118" y="465" dominant-baseline="central">nodo U</text>

  <circle cx="220" cy="461" r="11" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="ts" x="238" y="465" dominant-baseline="central">nodo 0 / 1</text>

  <circle cx="360" cy="461" r="11" fill="none" stroke="#1D9E75" stroke-width="2"/>
  <text class="ts" x="378" y="465" dominant-baseline="central">v habilitable</text>

  <circle cx="490" cy="461" r="11" fill="none" stroke="#A32D2D" stroke-width="2"/>
  <text class="ts" x="508" y="465" dominant-baseline="central">v no habilitable</text>
</svg>
